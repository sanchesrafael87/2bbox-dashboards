<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2BBOX - Painel de Produção</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-2bbox: #4CD964;
            --verde-escuro: #2D8C3C;
            --verde-brilho: #6EFF85;
            --preto: #0A0A0A;
            --preto-card: #141414;
            --preto-borda: #1E1E1E;
            --branco: #FFFFFF;
            --cinza: #888888;
            --amarelo: #FFD93D;
            --azul: #4DA6FF;
            --roxo: #9B59B6;
            --vermelho: #FF4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--preto);
            color: var(--branco);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at top left, rgba(76, 217, 100, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(76, 217, 100, 0.02) 0%, transparent 50%);
        }

        /* ===== CONFIG OVERLAY ===== */
        .config-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.97);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .config-overlay.hidden { display: none; }

        .config-box {
            background: var(--preto-card);
            border: 1px solid var(--preto-borda);
            border-top: 3px solid var(--verde-2bbox);
            border-radius: 12px;
            padding: 40px;
            max-width: 560px;
            width: 92%;
            text-align: center;
        }
        .config-box .logo-text { margin-bottom: 20px; }
        .config-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--verde-2bbox);
            margin-bottom: 16px;
        }
        .config-box p { color: var(--cinza); margin-bottom: 16px; }
        .config-box ol {
            text-align: left;
            color: #aaa;
            margin-bottom: 20px;
            padding-left: 20px;
            line-height: 1.7;
        }
        .config-box ol strong { color: var(--verde-2bbox); }
        .config-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--preto);
            border: 1px solid var(--preto-borda);
            border-radius: 8px;
            color: var(--branco);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            margin-bottom: 14px;
            outline: none;
        }
        .config-input:focus { border-color: var(--verde-2bbox); }
        .config-btn {
            width: 100%;
            padding: 14px;
            background: var(--verde-2bbox);
            border: none;
            border-radius: 8px;
            color: var(--preto);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .config-btn:hover { background: var(--verde-brilho); }
        .config-btn.secondary {
            background: transparent;
            border: 1px solid var(--preto-borda);
            color: var(--cinza);
            margin-top: 10px;
        }
        .config-btn.secondary:hover { border-color: var(--verde-2bbox); color: var(--verde-2bbox); }
        .config-note { color: var(--cinza); font-size: 0.85rem; margin-top: 12px; }
        .config-link {
            display: inline-block;
            margin-top: 18px;
            color: var(--verde-2bbox);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            border-bottom: 1px dashed var(--verde-escuro);
            padding-bottom: 2px;
        }
        .config-link:hover { color: var(--verde-brilho); }

        /* ===== LOGO (texto estilizado) ===== */
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--branco);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .logo-text .box {
            color: var(--verde-2bbox);
            text-shadow: 0 0 18px rgba(76, 217, 100, 0.5);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: linear-gradient(180deg, rgba(20,20,20,1) 0%, rgba(10,10,10,0) 100%);
            border-bottom: 1px solid var(--preto-borda);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(6px);
        }
        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--verde-2bbox);
            text-transform: uppercase;
        }
        .header-right { text-align: right; }
        .clock {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--branco);
        }
        .last-update { font-size: 0.85rem; color: var(--cinza); }
        .last-update .dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--verde-2bbox);
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ===== RESUMO ===== */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 20px 40px;
        }
        .summary-item {
            background: var(--preto-card);
            border: 1px solid var(--preto-borda);
            border-radius: 10px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .summary-item .label {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--cinza);
        }
        .summary-item .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
        }
        .summary-item.aguardando .value { color: var(--amarelo); }
        .summary-item.producao .value { color: var(--azul); }
        .summary-item.finalizado .value { color: var(--verde-2bbox); }
        .summary-item.enviado .value { color: var(--roxo); }

        /* ===== SEÇÕES ===== */
        .content { padding: 0 40px 60px; }
        .section { margin-bottom: 30px; }
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 14px;
            margin-bottom: 16px;
        }
        .section-title.aguardando { color: var(--amarelo); border-left: 3px solid var(--amarelo); }
        .section-title.producao { color: var(--azul); border-left: 3px solid var(--azul); }
        .section-title.finalizado { color: var(--verde-2bbox); border-left: 3px solid var(--verde-2bbox); }
        .section-title.enviado { color: var(--roxo); border-left: 3px solid var(--roxo); }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--preto-card);
            border: 1px solid var(--preto-borda);
            border-radius: 12px;
            padding: 18px 20px;
            position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card.aguardando { border-top: 3px solid var(--amarelo); }
        .card.producao { border-top: 3px solid var(--azul); }
        .card.finalizado { border-top: 3px solid var(--verde-2bbox); }
        .card.enviado { border-top: 3px solid var(--roxo); }
        .card.atrasado {
            border-color: var(--vermelho);
            box-shadow: 0 0 14px rgba(255, 71, 87, 0.25);
            animation: alertPulse 2.4s infinite;
        }
        @keyframes alertPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 71, 87, 0.15); }
            50% { box-shadow: 0 0 20px rgba(255, 71, 87, 0.45); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .card-id {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--verde-2bbox);
        }
        .badge {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .badge.whatsapp { background: rgba(76,217,100,0.12); color: var(--verde-2bbox); border: 1px solid rgba(76,217,100,0.35); }
        .badge.mercadolivre { background: rgba(255,217,61,0.10); color: var(--amarelo); border: 1px solid rgba(255,217,61,0.35); }
        .badge.tray { background: rgba(77,166,255,0.10); color: var(--azul); border: 1px solid rgba(77,166,255,0.35); }
        .badge.outro { background: rgba(136,136,136,0.10); color: var(--cinza); border: 1px solid rgba(136,136,136,0.35); }

        .card-obs {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--branco);
            margin-bottom: 10px;
            min-height: 2.6em;
        }
        .obs-label {
            color: var(--verde-2bbox);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.72em;
            font-weight: 700;
            letter-spacing: 1px;
            vertical-align: middle;
        }
        .obs-vazia { color: #444; }
        /* Cronômetro no rodapé do card — cor discreta (sem verde) */
        .card-timer {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--preto-borda);
            font-family: 'Rajdhani', sans-serif;
            color: #8a8f98;
            white-space: nowrap;
        }
        .card-timer .tlabel {
            font-size: 0.72rem;
            font-weight: 600;
            color: #6a6f78;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .card-timer .tval {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: #b8bdc6;
            letter-spacing: 0.5px;
        }
        /* Atrasado: leve realce âmbar discreto, sem gritar */
        .card.atrasado .card-timer .tval { color: #d99a3a; }
        .card-timer.sem-dado .tval { color:#555; }
        .card-meta {
            font-size: 0.98rem;
            color: #ccc;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--preto-borda);
        }
        .card-meta strong { color: var(--branco); }
        .card-cliente {
            font-size: 0.95rem;
            font-weight: 600;
            color: #bbb;
            margin-bottom: 12px;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--cinza);
            border-top: 1px solid var(--preto-borda);
            padding-top: 10px;
        }
        .card-footer strong { color: var(--branco); font-weight: 600; }
        .alerta-atraso {
            margin-top: 10px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--vermelho);
            text-transform: uppercase;
        }

        .empty-msg {
            text-align: center;
            color: var(--cinza);
            padding: 60px 20px;
            font-size: 1.1rem;
        }

        /* ===== CONTROLES (scroll/config) ===== */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 200;
        }
        .ctrl-btn {
            background: var(--preto-card);
            border: 1px solid var(--preto-borda);
            color: var(--cinza);
            border-radius: 8px;
            padding: 10px 16px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover, .ctrl-btn.active {
            border-color: var(--verde-2bbox);
            color: var(--verde-2bbox);
        }

        @media (max-width: 900px) {
            .summary-bar { grid-template-columns: repeat(2, 1fr); padding: 16px 20px; }
            .content { padding: 0 20px 60px; }
            .header { padding: 16px 20px; }
            .header-title { display: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            .card.atrasado, .last-update .dot { animation: none; }
        }
    </style>
</head>
<body>

    <!-- Tela de configuração -->
    <div class="config-overlay" id="configOverlay">
        <div class="config-box">
            <div class="logo-text">2B<span class="box">BOX</span></div>
            <h2>CONFIGURAÇÃO INICIAL</h2>
            
            <button class="config-btn" onclick="saveConfig()">CONECTAR À PLANILHA</button>
            <button class="config-btn secondary" onclick="loadDemo()">VER MODO DEMO</button>
            <a class="config-link" href="https://docs.google.com/spreadsheets/d/1wmyU-mvObHDjShwHOECrIeeyuo8tBtMY7Z_buJYNVrc/edit" target="_blank" rel="noopener">📄 Abrir planilha PRODUCAO_2BBOX_v2 →</a>
            <p class="config-note">O dashboard atualiza automaticamente a cada 2 minutos</p>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="logo-text">2B<span class="box">BOX</span></div>
        <div class="header-title">Painel de Produção</div>
        <div class="header-right">
            <div class="clock" id="clock">--:--</div>
            <div class="last-update"><span class="dot"></span><span id="lastUpdate">aguardando dados</span></div>
        </div>
    </header>

    <!-- Resumo -->
    <div class="summary-bar" id="summaryBar"></div>

    <!-- Conteúdo -->
    <main class="content" id="content">
        <div class="empty-msg">Configure a planilha para começar.</div>
    </main>

    <!-- Controles -->
    <div class="controls">
        <button class="ctrl-btn active" id="scrollBtn" onclick="toggleScroll()">⏸ SCROLL AUTO</button>
        <button class="ctrl-btn" onclick="openConfig()">⚙ CONFIG</button>
    </div>

<script>
/* ============================================================
   2BBOX — Painel de Produção (TV)
   Lê CSV publicado do Google Sheets, agrupa por status,
   alerta atrasos e rola a tela automaticamente.
   ============================================================ */

const REFRESH_MS = 2 * 60 * 1000;   // 2 minutos
const SCROLL_STEP = 1;              // px por tick
const SCROLL_TICK = 35;             // ms entre ticks
const SCROLL_PAUSE_END = 4000;      // pausa no fim (ms)
const SCROLL_PAUSE_TOP = 5000;      // pausa no topo (ms) — TV tem mais info no topo

let csvUrl = localStorage.getItem('2bbox_csv_url') || '';
let demoMode = false;
let autoScroll = true;
let scrollTimer = null;

/* ---------- Relógio ---------- */
function tickClock() {
    const n = new Date();
    document.getElementById('clock').textContent =
        n.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
setInterval(tickClock, 1000); tickClock();

/* ---------- Cronômetros ao vivo (1s) ---------- */
function tickTimers() {
    const now = Date.now();
    document.querySelectorAll('.card-timer[data-since]').forEach(el => {
        const since = parseInt(el.getAttribute('data-since'));
        if (!isNaN(since)) {
            const val = el.querySelector('.tval');
            if (val) val.textContent = formatDuracao(now - since);
        }
    });
}
setInterval(tickTimers, 1000);

/* ---------- Config ---------- */
function openConfig() {
    document.getElementById('configOverlay').classList.remove('hidden');
}
const FONTE_DADOS = 'https://cases2bbox.app.n8n.cloud/webhook/dashboard-producao?token=2bx_dash_7kM9pQ';
function saveConfig() {
    csvUrl = FONTE_DADOS;
    demoMode = false;
    localStorage.setItem('2bbox_csv_url', csvUrl);
    document.getElementById('configOverlay').classList.add('hidden');
    fetchData();
}
function loadDemo() {
    demoMode = true;
    document.getElementById('configOverlay').classList.add('hidden');
    render(parseRows(DEMO_DATA));
    setUpdated('modo demo');
}

/* ---------- CSV ---------- */
function parseCSV(text) {
    const rows = [];
    let row = [], cur = '', inQ = false;
    for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQ) {
            if (c === '"' && text[i+1] === '"') { cur += '"'; i++; }
            else if (c === '"') inQ = false;
            else cur += c;
        } else {
            if (c === '"') inQ = true;
            else if (c === ',') { row.push(cur); cur = ''; }
            else if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ''; }
            else if (c !== '\r') cur += c;
        }
    }
    if (cur || row.length) { row.push(cur); rows.push(row); }
    return rows.filter(r => r.some(c => c.trim() !== ''));
}

/* Mapeia colunas pelo nome do cabeçalho (flexível) */

/* Converte resposta JSON do webhook n8n em linhas (header + rows) */
function rowsFromJSON(data) {
    const arr = Array.isArray(data) ? data : [data];
    const objs = arr.map(o => (o && o.json) ? o.json : o).filter(o => o && typeof o === 'object');
    if (!objs.length) return [];
    const header = Object.keys(objs[0]).filter(k => k !== 'row_number');
    return [header, ...objs.map(o => header.map(k => (o[k] !== undefined && o[k] !== null) ? String(o[k]) : ''))];
}

function mapHeaders(header) {
    const h = header.map(x => x.toLowerCase().trim());
    const find = (...keys) => h.findIndex(col => keys.some(k => col.includes(k)));
    return {
        id:      find('pedido', 'id', 'nº', 'numero', 'número'),
        cliente: find('cliente', 'nome'),
        produto: find('produto', 'item', 'descri'),
        sku:     find('sku'),
        modelo:  find('modelo'),
        qtd:     find('qtd', 'quant'),
        origem:  find('origem', 'canal', 'fonte'),
        entrada: find('entrada', 'data'),
        prazo:   find('prazo', 'entrega', 'limite'),
        obs:     find('obs', 'observa'),
        dtProducao:  find('dt_producao','dt_produ','data_producao'),
        dtFinalizado:find('dt_finalizado','dt_final','data_finalizado'),
        dtFim:       find('data_fim','dt_fim','data_envio'),
        status:  find('status', 'situa')
    };
}

function parseRows(rows) {
    if (!rows.length) return [];
    const m = mapHeaders(rows[0]);
    const get = (r, idx) => (idx >= 0 && r[idx] !== undefined) ? r[idx].trim() : '';
    return rows.slice(1).map(r => ({
        id:      get(r, m.id),
        cliente: get(r, m.cliente),
        produto: get(r, m.produto),
        sku:     get(r, m.sku),
        modelo:  get(r, m.modelo),
        qtd:     get(r, m.qtd),
        origem:  get(r, m.origem),
        entrada: get(r, m.entrada),
        prazo:   get(r, m.prazo),
        obs:     get(r, m.obs),
        dtProducao:  get(r, m.dtProducao),
        dtFinalizado:get(r, m.dtFinalizado),
        dtFim:       get(r, m.dtFim),
        status:  normalizeStatus(get(r, m.status))
    })).filter(p => (p.id || p.cliente || p.produto) && p.status !== null);
}

function normalizeStatus(s) {
    const t = (s || '').toLowerCase();
    if (t.includes('cancel') || t.includes('entreg')) return null; // fora do painel
    if (t.includes('aguard') || t.includes('pendente') || t.includes('fila') || t.includes('process')) return 'Aguardando';
    if (t.includes('produ') || t.includes('andamento') || t.includes('fabrica')) return 'Em Produção';
    if (t.includes('final') || t.includes('pronto') || t.includes('conclu')) return 'Finalizado';
    if (t.includes('envi') || t.includes('despach') || t.includes('postado')) return 'Enviado';
    return 'Aguardando';
}

function parseDate(s) {
    if (!s) return null;
    const br = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:[ ,T]+(\d{1,2}):(\d{2}))?/);
    if (br) {
        let y = parseInt(br[3]); if (y < 100) y += 2000;
        const hh = br[4] !== undefined ? parseInt(br[4]) : 0;
        const mm = br[5] !== undefined ? parseInt(br[5]) : 0;
        return new Date(y, parseInt(br[2]) - 1, parseInt(br[1]), hh, mm);
    }
    const d = new Date(s);
    return isNaN(d) ? null : d;
}

/* Formata duração entre dois instantes em 'Xd Yh Zm' (ou 'Zm Ws' se < 1h) */
function formatDuracao(ms) {
    if (ms < 0) ms = 0;
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + sec + 's';
    return sec + 's';
}

function isAtrasado(p) {
    if (p.status === 'Finalizado' || p.status === 'Enviado') return false;
    const d = parseDate(p.prazo);
    if (!d) return false;
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    return d < hoje;
}

/* ---------- Fetch ---------- */
async function fetchData() {
    if (demoMode || !csvUrl) return;
    try {
        const resp = await fetch(csvUrl + (csvUrl.includes('?') ? '&' : '?') + 't=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const text = await resp.text();
        const trimmed = text.trim();
        const rows = (trimmed.startsWith('[') || trimmed.startsWith('{'))
            ? rowsFromJSON(JSON.parse(trimmed))
            : parseCSV(text);
        render(parseRows(rows));
        setUpdated('atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}));
    } catch (e) {
        setUpdated('erro ao ler planilha — verifique o link publicado');
        console.error(e);
    }
}
function setUpdated(msg) { document.getElementById('lastUpdate').textContent = msg; }

/* ---------- Render ---------- */
function origemClass(o) {
    const t = (o || '').toLowerCase();
    if (t.includes('whats') || t.includes('zap')) return ['whatsapp', 'WhatsApp'];
    if (t.includes('mercado') || t === 'ml') return ['mercadolivre', 'Mercado Livre'];
    if (t.includes('tray') || t.includes('site')) return ['tray', 'Site Tray'];
    return ['outro', o || '—'];
}

function createCard(p, cls) {
    const atrasado = isAtrasado(p);
    const [oCls, oLabel] = origemClass(p.origem);
    const obsTexto = (p.obs && p.obs.trim()) ? esc(p.obs) : '<span class="obs-vazia">—</span>';
    const metaParts = [];
    if (p.sku) metaParts.push('<strong>' + esc(p.sku) + '</strong>');
    if (p.produto) metaParts.push(esc(p.produto));
    if (p.modelo) metaParts.push('<strong style="color:var(--verde-2bbox)">[' + esc(p.modelo) + ']</strong>');
    if (p.qtd) metaParts.push('<strong>' + esc(p.qtd) + 'x</strong>');

    // Cronômetro: tempo na FASE ATUAL = agora − carimbo de entrada da fase.
    // Cada fase tem seu próprio carimbo (write-once), então o histórico nunca se perde.
    const carimboFase = {
        'Aguardando':  p.entrada,
        'Em Produção': p.dtProducao,
        'Finalizado':  p.dtFinalizado,
        'Enviado':     p.dtFim
    };
    const dtFase = parseDate(carimboFase[p.status]) || parseDate(p.entrada);
    let timerHTML;
    if (dtFase) {
        timerHTML = '<div class="card-timer" data-since="' + dtFase.getTime() + '">'
            + '<span class="tlabel">⏱ nesta fase</span> <span class="tval">' + formatDuracao(Date.now() - dtFase.getTime()) + '</span></div>';
    } else {
        timerHTML = '<div class="card-timer sem-dado"><span class="tlabel">⏱ nesta fase</span> <span class="tval">—</span></div>';
    }
    return `
        <div class="card ${cls}${atrasado ? ' atrasado' : ''}">
            <div class="card-header">
                <span class="card-id">#${esc(p.id) || '—'}</span>
                <span class="badge ${oCls}">${esc(oLabel)}</span>
            </div>
            <div class="card-meta">${metaParts.join(' · ') || '—'}</div>
            <div class="card-obs"><span class="obs-label">OBS:</span> ${obsTexto}</div>
            <div class="card-cliente">👤 ${esc(p.cliente) || 'Cliente não informado'}</div>
            <div class="card-footer">
                <span>Entrada: <strong>${esc(p.entrada) || '—'}</strong></span>
                <span>Prazo: <strong>${esc(p.prazo) || '—'}</strong></span>
            </div>
            ${timerHTML}
            ${atrasado ? '<div class="alerta-atraso">⚠ Pedido atrasado</div>' : ''}
        </div>`;
}

function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(pedidos) {
    const byStatus = { 'Aguardando': [], 'Em Produção': [], 'Finalizado': [], 'Enviado': [] };
    pedidos.forEach(p => (byStatus[p.status] || byStatus['Aguardando']).push(p));

    // Resumo
    document.getElementById('summaryBar').innerHTML = `
        <div class="summary-item aguardando"><span class="label">⏳ Aguardando</span><span class="value">${byStatus['Aguardando'].length}</span></div>
        <div class="summary-item producao"><span class="label">🔨 Em Produção</span><span class="value">${byStatus['Em Produção'].length}</span></div>
        <div class="summary-item finalizado"><span class="label">✅ Finalizado</span><span class="value">${byStatus['Finalizado'].length}</span></div>
        <div class="summary-item enviado"><span class="label">📦 Enviado</span><span class="value">${byStatus['Enviado'].length}</span></div>`;

    // Seções
    let html = '';
    const sections = [
        ['Aguardando', 'aguardando', '⏳ Aguardando'],
        ['Em Produção', 'producao', '🔨 Em Produção'],
        ['Finalizado', 'finalizado', '✅ Finalizado'],
        ['Enviado', 'enviado', '📦 Enviado']
    ];
    sections.forEach(([key, cls, label]) => {
        if (byStatus[key].length > 0) {
            html += `
                <div class="section">
                    <div class="section-title ${cls}">${label} (${byStatus[key].length})</div>
                    <div class="cards-container">
                        ${byStatus[key].map(p => createCard(p, cls)).join('')}
                    </div>
                </div>`;
        }
    });
    document.getElementById('content').innerHTML =
        html || '<div class="empty-msg">Nenhum pedido encontrado na planilha.</div>';
}

/* ---------- Auto-scroll ---------- */
function startScroll() {
    stopScroll();
    // Começa o ciclo com a pausa no topo (que também dispara o 1o refresh visual)
    topPauseThenScroll();
    scrollTimer = setInterval(() => {
        if (!autoScroll) return;
        const max = document.documentElement.scrollHeight - window.innerHeight;
        if (max <= 0) return;                 // cabe tudo na tela: sem scroll
        window.scrollBy(0, SCROLL_STEP);
        if (window.scrollY >= max - 2) {
            // chegou no fim: pausa, volta ao topo, atualiza dados e re-pausa no topo
            autoScroll = false;
            setTimeout(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                setTimeout(topPauseThenScroll, 900);   // espera o scroll suave terminar
            }, SCROLL_PAUSE_END);
        }
    }, SCROLL_TICK);
}

/* Pausa no topo por SCROLL_PAUSE_TOP e força refresh dos dados antes de descer */
function topPauseThenScroll() {
    autoScroll = false;
    fetchData();                              // refresh automático a cada volta ao topo
    setTimeout(() => { autoScroll = btnActive(); }, SCROLL_PAUSE_TOP);
}
function btnActive() { return document.getElementById('scrollBtn').classList.contains('active'); }
function toggleScroll() {
    const btn = document.getElementById('scrollBtn');
    btn.classList.toggle('active');
    autoScroll = btn.classList.contains('active');
    btn.textContent = autoScroll ? '⏸ SCROLL AUTO' : '▶ SCROLL AUTO';
}
function stopScroll() { if (scrollTimer) clearInterval(scrollTimer); }
