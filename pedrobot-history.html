<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PedroBot · Histórico · 2BBOX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; font-family: 'DM Sans', sans-serif; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
#login-screen { position:fixed; inset:0; background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%); display:flex; align-items:center; justify-content:center; z-index:999; }
.login-box { background:rgba(30,41,59,0.8); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:48px 40px; width:380px; text-align:center; }
.login-box h1 { font-family:'Space Mono',monospace; font-weight:700; font-size:22px; color:#f8fafc; margin:8px 0 4px; }
.login-box p { color:#94a3b8; font-size:13px; margin-bottom:32px; }
.login-box input { width:100%; padding:14px 16px; border-radius:12px; border:2px solid rgba(255,255,255,0.1); background:rgba(15,23,42,0.6); color:#f8fafc; font-size:15px; outline:none; font-family:'DM Sans',sans-serif; }
.login-box input.error { border-color:#ef4444; }
.login-box .err-msg { color:#ef4444; font-size:12px; margin-top:8px; display:none; }
.login-box button { width:100%; padding:14px; border-radius:12px; border:none; background:linear-gradient(135deg,#25D366,#128C7E); color:#fff; font-size:15px; font-weight:600; cursor:pointer; margin-top:16px; font-family:'DM Sans',sans-serif; }
.login-box small { display:block; color:#475569; font-size:11px; margin-top:24px; }
#app { display:none; flex-direction:column; height:100vh; }
.topbar { padding:12px 24px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:space-between; background:rgba(15,23,42,0.95); backdrop-filter:blur(10px); flex-shrink:0; }
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-left h1 { font-family:'Space Mono',monospace; font-weight:700; font-size:17px; letter-spacing:-0.5px; color:#f8fafc; line-height:1.2; }
.topbar-left span { font-size:11px; color:#64748b; display:block; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.updated-at { font-size:10px; color:#334155; }
.btn-refresh { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:6px 12px; cursor:pointer; color:#94a3b8; font-size:13px; display:flex; align-items:center; gap:6px; font-family:'DM Sans',sans-serif; transition:background 0.15s; }
.btn-refresh:hover { background:rgba(255,255,255,0.1); color:#e2e8f0; }
.btn-refresh.spinning svg { animation:spin 1s linear infinite; }
.online-dot { width:6px; height:6px; border-radius:50%; background:#25D366; box-shadow:0 0 8px #25D366; display:inline-block; animation:pulse 2s infinite; }
.badge-2bbox { background:rgba(255,255,255,0.06); border-radius:8px; padding:4px 12px; font-size:11px; color:#94a3b8; font-weight:500; }
.stats-bar { display:flex; gap:12px; padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.06); overflow-x:auto; flex-shrink:0; }
.stat-card { background:rgba(255,255,255,0.04); border-radius:12px; padding:10px 16px; min-width:100px; flex:1; }
.stat-card .label { font-size:11px; color:#64748b; margin-bottom:2px; }
.stat-card .value { font-size:22px; font-weight:700; color:#f1f5f9; font-family:'Space Mono',monospace; }
.main { flex:1; display:flex; overflow:hidden; }
.sidebar { width:360px; border-right:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; flex-shrink:0; }
.filters { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.04); }
.filters input { width:100%; padding:10px 14px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:#e2e8f0; font-size:13px; outline:none; font-family:'DM Sans',sans-serif; margin-bottom:10px; }
.filters-row { display:flex; gap:8px; }
.filters-row select { flex:1; padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); background:rgba(15,23,42,0.8); color:#94a3b8; font-size:12px; outline:none; cursor:pointer; font-family:'DM Sans',sans-serif; }
.conv-list { flex:1; overflow-y:auto; }
.conv-item { padding:14px 20px; cursor:pointer; border-left:3px solid transparent; border-bottom:1px solid rgba(255,255,255,0.04); transition:all 0.15s; }
.conv-item:hover { background:rgba(255,255,255,0.03); }
.conv-item.active { border-left-color:#25D366; background:rgba(37,211,102,0.06); }
.conv-item .name { color:#f1f5f9; font-weight:600; font-size:14px; }
.conv-item .phone { color:#64748b; font-size:12px; margin:4px 0; }
.conv-item .preview { color:#94a3b8; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:8px; }
.conv-item .tags { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.action-badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:6px; letter-spacing:0.3px; }
.status-dot { font-size:10px; }
.shortcut-badge { font-size:10px; color:#475569; }
.sidebar-footer { padding:10px 16px; border-top:1px solid rgba(255,255,255,0.04); font-size:10px; color:#334155; text-align:center; }
.empty-state { padding:32px; text-align:center; color:#475569; font-size:13px; }
.chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#334155; gap:12px; }
.chat-empty span { font-size:48px; } .chat-empty p { font-size:14px; }
.chat-header { padding:14px 24px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.chat-header .avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#1e293b,#334155); border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:18px; }
.chat-header-info { margin-left:12px; }
.chat-header-info .cname { color:#f1f5f9; font-weight:600; font-size:15px; }
.chat-header-info .cphone { color:#64748b; font-size:12px; }
.chat-header-badges { display:flex; gap:8px; }
.chat-header-badges .hbadge { font-size:11px; font-weight:600; padding:4px 12px; border-radius:8px; }
.chat-date { text-align:center; padding:12px; font-size:11px; color:#475569; }
.chat-messages { flex:1; overflow-y:auto; padding:8px 0 16px; }
.bubble-wrap { display:flex; padding:0 20px; margin-bottom:12px; }
.bubble-wrap.bot { justify-content:flex-start; }
.bubble-wrap.customer { justify-content:flex-end; }
.bubble-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; align-self:flex-end; }
.bubble-avatar.bot-av { background:linear-gradient(135deg,#25D366,#128C7E); margin-right:8px; }
.bubble-avatar.cust-av { background:rgba(255,255,255,0.08); margin-left:8px; }
.bubble { max-width:72%; padding:10px 14px; }
.bubble.bot { background:rgba(255,255,255,0.06); border-radius:4px 16px 16px 16px; border:1px solid rgba(255,255,255,0.06); }
.bubble.customer { background:rgba(37,211,102,0.15); border-radius:16px 4px 16px 16px; border:1px solid rgba(37,211,102,0.2); }
.bubble p { color:#e2e8f0; font-size:13.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word; }
.bubble .btime { font-size:10px; color:#475569; text-align:right; margin-top:4px; }
.chat-footer { padding:10px 24px; border-top:1px solid rgba(255,255,255,0.06); display:flex; gap:20px; color:#475569; font-size:11px; flex-shrink:0; }
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box" id="login-box">
    <div style="font-size:48px">🤖</div>
    <h1>PedroBot</h1>
    <p>Histórico de Conversas · 2BBOX</p>
    <input type="password" id="pw-input" placeholder="Senha de acesso" />
    <div class="err-msg" id="err-msg">Senha incorreta</div>
    <button onclick="doLogin()">Entrar</button>
    <small>ⓘ Acesso restrito ao administrador</small>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:24px">🤖</span>
      <div>
        <h1>PedroBot</h1>
        <span>Histórico de Conversas</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="updated-at">atualizado 23/02/2026, 15:32:00</span>
      <button class="btn-refresh" onclick="doRefresh()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Atualizar
      </button>
      <span style="font-size:11px;color:#25D366;display:flex;align-items:center;gap:4px"><span class="online-dot"></span>Bot Online</span>
      <span class="badge-2bbox">2BBOX</span>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="main">
    <div class="sidebar">
      <div class="filters">
        <input type="text" id="search-input" placeholder="🔍 Buscar por nome, telefone ou produto..." oninput="applyFilters()" />
        <div class="filters-row">
          <select id="filter-action" onchange="applyFilters()">
            <option value="">Todas ações</option>
            <option value="BUSCAR_PRODUTO">Buscar Produto</option>
            <option value="ORCAMENTO_CUSTOMIZADO">Orçamento Custom</option>
            <option value="DJ_FORA_CATALOGO">Fora do Catálogo</option>
            <option value="ESCALAR_HUMANO">Escalado</option>
            <option value="CONFIRMAR_PEDIDO">Confirmar Pedido</option>
            <option value="CONFIRMAR_DIMENSOES">Confirmar Dimensões</option>
            <option value="INFORMAR_CEP">Informar CEP</option>
            <option value="FRETE_ESCOLHIDO">Frete Escolhido</option>
            <option value="DUVIDA">Dúvida Geral</option>
          </select>
          <select id="filter-status" onchange="applyFilters()">
            <option value="">Todos status</option>
            <option value="resolvido">Resolvido</option>
            <option value="pedido_confirmado">Confirmado</option>
            <option value="escalado">Escalado</option>
            <option value="em_andamento">Andamento</option>
            <option value="inicio">Início</option>
          </select>
        </div>
      </div>
      <div class="conv-list" id="conv-list"></div>
      <div class="sidebar-footer" id="sidebar-footer"></div>
    </div>
    <div class="chat-area" id="chat-area">
      <div class="chat-empty"><span>💬</span><p>Selecione uma conversa</p></div>
    </div>
  </div>
</div>

<script>
const ACTION_LABELS = {"BUSCAR_PRODUTO":{"label":"Buscar Produto","color":"#10b981","bg":"rgba(16,185,129,0.12)"},"ORCAMENTO_CUSTOMIZADO":{"label":"Orçamento Custom","color":"#8b5cf6","bg":"rgba(139,92,246,0.12)"},"DJ_FORA_CATALOGO":{"label":"Fora do Catálogo","color":"#f59e0b","bg":"rgba(245,158,11,0.12)"},"ESCALAR_HUMANO":{"label":"Escalado","color":"#ef4444","bg":"rgba(239,68,68,0.12)"},"CONFIRMAR_PEDIDO":{"label":"Confirmar Pedido","color":"#3b82f6","bg":"rgba(59,130,246,0.12)"},"CONFIRMAR_DIMENSOES":{"label":"Confirmar Dimensões","color":"#06b6d4","bg":"rgba(6,182,212,0.12)"},"INFORMAR_CEP":{"label":"Informar CEP","color":"#64748b","bg":"rgba(100,116,139,0.12)"},"FRETE_ESCOLHIDO":{"label":"Frete Escolhido","color":"#22c55e","bg":"rgba(34,197,94,0.12)"},"DUVIDA":{"label":"Dúvida Geral","color":"#94a3b8","bg":"rgba(148,163,184,0.12)"}};
const STATUS_LABELS = {"resolvido":{"label":"Resolvido","color":"#10b981"},"pedido_confirmado":{"label":"Confirmado","color":"#3b82f6"},"escalado":{"label":"Escalado","color":"#f59e0b"},"em_andamento":{"label":"Andamento","color":"#6366f1"},"inicio":{"label":"Início","color":"#64748b"}};
const ALL_CONVERSATIONS = [{"id":"conv_session_554195000864","phone":"","customerName":"Cliente","startedAt":"2026-02-23T13:31:39.729Z","lastMessageAt":"2026-02-23T17:27:58.034Z","action":"","status":"em_andamento","product":"","via_shortcut":"NAO","messages":[]}];

let filtered = [];
let selectedId = null;

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === '2bbox2026') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    init();
  } else {
    document.getElementById('pw-input').classList.add('error');
    document.getElementById('err-msg').style.display = 'block';
    const box = document.getElementById('login-box');
    box.style.animation = 'shake 0.5s ease-in-out';
    setTimeout(() => box.style.animation = '', 500);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('pw-input').addEventListener('input', () => {
  document.getElementById('pw-input').classList.remove('error');
  document.getElementById('err-msg').style.display = 'none';
});

function doRefresh() {
  const btn = document.querySelector('.btn-refresh');
  btn.classList.add('spinning');
  setTimeout(() => location.reload(), 300);
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  const today = new Date(); const yest = new Date(today); yest.setDate(yest.getDate()-1);
  if (d.toDateString() === today.toDateString()) return 'Hoje';
  if (d.toDateString() === yest.toDateString()) return 'Ontem';
  return d.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'});
}

function formatFullDate(s) {
  if (!s) return '';
  return new Date(s).toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function init() {
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const action = document.getElementById('filter-action').value;
  const status = document.getElementById('filter-status').value;
  filtered = ALL_CONVERSATIONS.filter(c => {
    const ms = search === '' || (c.customerName||'').toLowerCase().includes(search) || (c.phone||'').includes(search) || (c.product||'').toLowerCase().includes(search) || (c.messages||[]).some(m => m.text.toLowerCase().includes(search));
    const ma = !action || c.action === action;
    const ms2 = !status || c.status === status;
    return ms && ma && ms2;
  });
  renderStats();
  renderList();
}

function renderStats() {
  const total = filtered.length;
  const resolved = filtered.filter(c => c.status === 'resolvido' || c.status === 'pedido_confirmado').length;
  const escalated = filtered.filter(c => c.status === 'escalado').length;
  const msgs = filtered.reduce((a,c) => a + (c.messages||[]).length, 0);
  document.getElementById('stats-bar').innerHTML = [
    {label:'💬 Conversas', val:total}, {label:'✅ Resolvidas', val:resolved},
    {label:'⚠️ Escaladas', val:escalated}, {label:'📨 Mensagens', val:msgs}
  ].map(s => '<div class="stat-card"><div class="label">'+s.label+'</div><div class="value">'+s.val+'</div></div>').join('');
}

function renderList() {
  const el = document.getElementById('conv-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">' + (ALL_CONVERSATIONS.length === 0 ? 'Nenhuma conversa na planilha' : 'Nenhuma conversa corresponde ao filtro') + '</div>';
    document.getElementById('sidebar-footer').textContent = '';
    return;
  }
  el.innerHTML = filtered.map(c => {
    const al = ACTION_LABELS[c.action] || {label: c.action||'—', color:'#94a3b8', bg:'rgba(148,163,184,0.12)'};
    const sl = STATUS_LABELS[c.status] || {label: c.status||'—', color:'#94a3b8'};
    const msgs = c.messages || [];
    const last = msgs[msgs.length-1];
    const preview = last ? (last.from==='bot'?'🤖 ':'👤 ') + last.text.slice(0,60) + (last.text.length>60?'…':'') : 'Sem mensagens';
    return '<div class="conv-item'+(c.id===selectedId?' active':'')+'" onclick="selectConv(''+c.id+'')">'+
      '<div style="display:flex;justify-content:space-between"><span class="name">'+c.customerName+'</span><span style="font-size:11px;color:#64748b">'+formatDate(c.startedAt)+'</span></div>'+
      '<div class="phone">'+c.phone+'</div>'+
      '<div class="preview">'+preview+'</div>'+
      '<div class="tags">'+
        '<span class="action-badge" style="color:'+al.color+';background:'+al.bg+'">'+al.label+'</span>'+
        (c.status ? '<span class="status-dot" style="color:'+sl.color+'">● '+sl.label+'</span>' : '')+
        (c.via_shortcut==='SIM' ? '<span class="shortcut-badge">⚡ atalho</span>' : '')+
      '</div></div>';
  }).join('');
  document.getElementById('sidebar-footer').textContent = '📊 '+filtered.length+' de '+ALL_CONVERSATIONS.length+' conversas · atualiza a cada 10min';
}

function selectConv(id) {
  selectedId = id;
  renderList();
  const conv = ALL_CONVERSATIONS.find(c => c.id === id);
  if (!conv) return;
  const al = ACTION_LABELS[conv.action] || {label:conv.action||'—', color:'#94a3b8', bg:'rgba(148,163,184,0.12)'};
  const sl = STATUS_LABELS[conv.status] || {label:conv.status||'—', color:'#94a3b8'};
  const msgs = conv.messages || [];
  const duration = (() => { const s=new Date(conv.startedAt),e=new Date(conv.lastMessageAt),d=Math.round((e-s)/60000); return isNaN(d)?'—':d+' min'; })();
  document.getElementById('chat-area').innerHTML =
    '<div class="chat-header">'+
      '<div style="display:flex;align-items:center"><div class="avatar">👤</div><div class="chat-header-info"><div class="cname">'+conv.customerName+'</div><div class="cphone">'+conv.phone+'</div></div></div>'+
      '<div class="chat-header-badges">'+
        '<span class="hbadge" style="color:'+al.color+';background:'+al.bg+'">'+al.label+'</span>'+
        '<span class="hbadge" style="color:'+sl.color+';background:rgba(0,0,0,0.2);border:1px solid '+sl.color+'40">● '+sl.label+'</span>'+
      '</div>'+
    '</div>'+
    '<div class="chat-date">'+formatFullDate(conv.startedAt)+(conv.product?'<span style="margin-left:8px;font-size:10px;background:rgba(255,255,255,0.06);border-radius:6px;padding:2px 8px;color:#94a3b8">📦 '+conv.product+'</span>':'')+'</div>'+
    '<div class="chat-messages" id="chat-msgs">'+
      (msgs.length===0 ? '<div style="text-align:center;color:#475569;padding:24px;font-size:13px">Nenhuma mensagem registrada</div>' :
        msgs.map(m => {
          const isBot = m.from==='bot';
          return '<div class="bubble-wrap '+(isBot?'bot':'customer')+'">'+
            (isBot?'<div class="bubble-avatar bot-av">🤖</div>':'')+
            '<div class="bubble '+(isBot?'bot':'customer')+'"><p>'+m.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</p><div class="btime">'+m.time+'</div></div>'+
            (!isBot?'<div class="bubble-avatar cust-av">👤</div>':'')+
          '</div>';
        }).join('')
      )+
    '</div>'+
    '<div class="chat-footer">'+
      '<span>📊 '+msgs.length+' mensagens</span>'+
      '<span>⏱️ '+duration+' de conversa</span>'+
      '<span>🤖 '+msgs.filter(m=>m.from==='bot').length+' respostas do bot</span>'+
      (conv.via_shortcut==='SIM'?'<span>⚡ Via atalho</span>':'')+
    '</div>';
  setTimeout(() => { const m=document.getElementById('chat-msgs'); if(m) m.scrollTop=m.scrollHeight; }, 50);
}
</script>
</body>
</html>
