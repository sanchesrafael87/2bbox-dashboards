<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>Painel de Comando · 2BBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0a0a0a; --bg2: #141414; --card: #181818; --borda: #262626;
        --branco: #f5f5f5; --cinza: #8a8f98; --cinza-fraco: #5a5f68;
        --verde: #4CD964; --amarelo: #FFB020; --azul: #3B9EFF; --roxo: #9B59B6;
        --teal: #2dd4bf; --vermelho: #FF5A5A; --laranja: #ff7a45;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--branco); font-family: 'Rajdhani', sans-serif; }
    body { padding-bottom: 50px; }

    /* ===== Topo ===== */
    .topbar { position: sticky; top: 0; z-index: 50; background: #0f0f0f; border-bottom: 1px solid var(--borda); padding: 14px 28px 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.45); }
    .topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; color: var(--branco); }
    .brand .logo b { color: var(--verde); }
    .brand .sub { font-size: 0.78rem; letter-spacing: 2px; text-transform: uppercase; color: var(--cinza-fraco); font-weight: 600; }
    .top-actions { display: flex; gap: 8px; }
    .mes-sel { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; color: var(--branco); background: var(--bg2); border: 1px solid var(--borda); border-radius: 8px; padding: 9px 12px; cursor: pointer; letter-spacing: 0.5px; text-transform: capitalize; }
    .mes-sel:hover { border-color: var(--verde); }
    .refresh-btn { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--cinza); background: var(--bg2); border: 1px solid var(--borda); border-radius: 8px; padding: 9px 14px; cursor: pointer; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
    .refresh-btn:hover { border-color: var(--verde); color: var(--verde); }
    .refresh-btn:active { transform: scale(0.96); }
    .refresh-btn.loading .ricon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-line { margin-top: 8px; font-size: 0.8rem; color: var(--cinza-fraco); display: flex; align-items: center; gap: 6px; }
    .status-line .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--verde); box-shadow: 0 0 8px var(--verde); }
    .status-line.err .dot { background: var(--vermelho); box-shadow: 0 0 8px var(--vermelho); }

    /* ===== Resumo do pipeline ===== */
    .pipe { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 28px 2px; }
    .pipe-item { flex: 1; min-width: 90px; background: var(--bg2); border: 1px solid var(--borda); border-radius: 10px; padding: 9px 6px; text-align: center; }
    .pipe-item .n { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.25rem; line-height: 1; }
    .pipe-item .l { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--cinza); margin-top: 5px; font-weight: 600; }
    .pipe-item.aguardando .n { color: var(--amarelo); }
    .pipe-item.producao1 .n { color: var(--azul); }
    .pipe-item.producao2 .n { color: var(--roxo); }
    .pipe-item.finalizado .n { color: var(--verde); }
    .pipe-item.enviado .n { color: var(--teal); }
    .pipe-item.entregue .n { color: #9aa0a6; }
    .pipe-item.cancelado .n { color: var(--vermelho); }

    /* ===== Seções (fases empilhadas) ===== */
    .wrap { padding: 10px 28px 0; }
    .fase { margin-bottom: 30px; }
    .fase-head { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; padding: 10px 16px; margin-bottom: 16px; border-radius: 10px; display: inline-flex; align-items: center; gap: 12px; color: #0d0d0d; }
    .fase-head .count { font-size: 0.95rem; background: rgba(0,0,0,0.28); color: #fff; border-radius: 20px; padding: 1px 12px; }
    .fase-head.aguardando { background: var(--amarelo); }
    .fase-head.producao1  { background: var(--azul); }
    .fase-head.producao2  { background: var(--roxo); color: #fff; }
    .fase-head.finalizado { background: var(--verde); }
    .fase-head.enviado    { background: var(--teal); }
    .fase-head.entregue   { background: #9aa0a6; }
    .fase-head.cancelado  { background: var(--vermelho); color: #fff; }
    .fase-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; align-items: stretch; }

    /* ===== Card (estilo dashboard) ===== */
    .card { background: var(--card); border: 1px solid var(--borda); border-left-width: 8px; border-radius: 14px; padding: 18px 20px; position: relative; display: flex; flex-direction: column; }
    .card .card-meta { margin-top: auto; }
    .card.busy { opacity: 0.5; pointer-events: none; }
    .card.aguardando { border-left-color: var(--amarelo); }
    .card.producao1  { border-left-color: var(--azul); }
    .card.producao2  { border-left-color: var(--roxo); }
    .card.finalizado { border-left-color: var(--verde); }
    .card.enviado    { border-left-color: var(--teal); }
    .card.entregue   { border-left-color: #9aa0a6; }
    .card.cancelado  { border-left-color: var(--vermelho); }
    .card.estoque    { border-left-color: var(--vermelho); background: #1c1414; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .card-title { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.25rem; line-height: 1.2; color: var(--branco); flex: 1; min-width: 0; min-height: 2.4em; display: flex; align-items: flex-start; }
    .badge-origem { flex: 0 0 auto; font-size: 0.64rem; font-weight: 700; padding: 3px 9px; border-radius: 14px; letter-spacing: 0.5px; white-space: nowrap; }
    .badge-origem.whatsapp { background: rgba(76,217,100,0.14); color: var(--verde); }
    .badge-origem.mercadolivre { background: rgba(255,176,32,0.14); color: var(--amarelo); }
    .badge-origem.shopee { background: rgba(255,122,69,0.16); color: var(--laranja); }
    .badge-origem.estoque { background: rgba(255,90,90,0.18); color: var(--vermelho); }
    .badge-origem.tray { background: rgba(59,158,255,0.14); color: var(--azul); }
    .badge-origem.outro { background: #222; color: var(--cinza); }

    .card-skuline { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--borda); }
    .card-skuline .sku { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--verde); }
    .card-skuline .sep { width: 2px; height: 1.4em; background: var(--borda); display: inline-block; }
    .card-skuline .mat { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.15rem; color: var(--branco); }
    .card-skuline .qtd { margin-left: auto; font-size: 1rem; font-weight: 700; color: var(--verde); }

    .card-idcli { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .card-idcli .ped { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: var(--verde); white-space: nowrap; }
    .card-idcli .ped-label { font-size: 0.7em; color: var(--cinza-fraco); letter-spacing: 1px; }
    .card-idcli .ped-fim { color: var(--branco); }
    .card-idcli .cli { font-size: 1.05rem; font-weight: 600; color: #cfcfcf; text-align: right; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .card-meta { display: flex; gap: 16px; font-size: 0.85rem; color: var(--cinza-fraco); }
    .card-meta strong { color: var(--cinza); font-weight: 600; }
    .card-meta .atraso { color: var(--vermelho); font-weight: 700; margin-left: auto; }

    /* Ação principal */
    .btn-avancar { width: 100%; margin-top: 14px; border: none; border-radius: 11px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.05rem; letter-spacing: 0.5px; padding: 14px; cursor: pointer; color: #06210d; background: var(--verde); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-avancar:active { transform: scale(0.98); }
    .btn-avancar .arrow { font-size: 1.2rem; }
    .btn-avancar.fase-aguardando { background: var(--amarelo); color: #2a1c00; }
    .btn-avancar.fase-estoque { background: var(--vermelho); color: #fff; }
    .btn-avancar.fase-producao1  { background: var(--azul);    color: #04203a; }
    .btn-avancar.fase-producao2  { background: var(--roxo);    color: #fff; }
    .btn-avancar.fase-finalizado { background: var(--verde);   color: #06210d; }
    .btn-avancar.fase-enviado    { background: var(--teal);    color: #04261f; }

    /* Corrigir */
    .corrigir-toggle { margin-top: 9px; text-align: center; font-size: 0.82rem; font-weight: 600; color: var(--cinza-fraco); cursor: pointer; padding: 6px; letter-spacing: 0.5px; }
    .corrigir-toggle:hover { color: var(--cinza); }
    .corrigir-box { display: none; margin-top: 8px; padding-top: 12px; border-top: 1px dashed var(--borda); }
    .corrigir-box.open { display: block; }
    .corrigir-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--cinza-fraco); margin-bottom: 8px; font-weight: 600; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; border-radius: 9px; cursor: pointer; border: 1px solid var(--borda); background: var(--bg2); color: var(--cinza); letter-spacing: 0.3px; }
    .chip:hover { border-color: var(--cinza); }
    .chip.atual { border-color: var(--branco); color: var(--branco); }
    .chip.cancelar { border-color: rgba(255,90,90,0.4); color: var(--vermelho); }

    .empty, .loading-msg { text-align: center; color: var(--cinza-fraco); padding: 60px 20px; font-size: 1rem; }
    .empty .big { font-size: 2.4rem; margin-bottom: 12px; }

    #toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(160%); background: #1d1d1d; border: 1px solid var(--borda); color: var(--branco); padding: 14px 22px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; transition: transform 0.3s ease; max-width: 90vw; text-align: center; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok { border-color: rgba(76,217,100,0.5); }
    #toast.err { border-color: rgba(255,90,90,0.5); }

    /* Config / toggle baixa de estoque */
    .config-panel { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; background: var(--bg2); border-bottom: 1px solid transparent; }
    .config-panel.open { max-height: 260px; border-bottom-color: var(--borda); }
    .config-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 28px; }
    .config-title { font-weight: 700; font-size: 1rem; color: var(--branco); }
    .config-desc { font-size: 0.85rem; color: var(--cinza); margin-top: 4px; line-height: 1.4; max-width: 720px; }
    .config-desc b { color: var(--azul); }
    .switch { width: 52px; height: 30px; border-radius: 30px; background: #333; position: relative; cursor: pointer; flex-shrink: 0; transition: background 0.2s; border: 1px solid var(--borda); }
    .switch.on { background: rgba(76,217,100,0.30); border-color: var(--verde); }
    .switch.loading { opacity: 0.5; pointer-events: none; }
    .switch .knob { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #888; transition: left 0.2s, background 0.2s; }
    .switch.on .knob { left: 25px; background: var(--verde); }
</style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-row">
            <div class="brand">
                <span class="logo">2<b>BBOX</b></span>
                <span class="sub">Comando de Produção</span>
            </div>
            <div class="top-actions">
                <select class="mes-sel" id="mesSel" onchange="onMesChange()" aria-label="Filtrar por mês"></select>
                <button class="refresh-btn" onclick="toggleConfig()"><span>⚙</span> Config</button>
                <button class="refresh-btn" id="refreshBtn" onclick="fetchData(true)"><span class="ricon">⟳</span> Atualizar</button>
            </div>
        </div>
        <div class="status-line" id="statusLine"><span class="dot"></span><span id="statusMsg">carregando…</span></div>
    </div>

    <div class="config-panel" id="configPanel">
        <div class="config-row">
            <div class="config-text">
                <div class="config-title">Baixa automática de estoque</div>
                <div class="config-desc">Quando ligada, o estoque é baixado assim que o pedido entra em <b>Montagem</b> — subtrai da planilha as quantidades de material da categoria/variante do case.</div>
            </div>
            <div class="switch" id="switchEstoque" onclick="toggleEstoque()"><div class="knob"></div></div>
        </div>
    </div>

    <div class="pipe" id="pipe"></div>

    <div class="wrap" id="content">
        <div class="loading-msg">Carregando pedidos…</div>
    </div>

    <div id="toast"></div>

<script>
/* ====== Config ====== */
const FONTE_DADOS = 'https://cases2bbox.app.n8n.cloud/webhook/dashboard-producao?token=2bx_dash_7kM9pQ';
const CMD_URL     = 'https://cases2bbox.app.n8n.cloud/webhook/comando-fase';
const CMD_TOKEN   = '2bx_cmd_7kM9pQ';
const CFG_SET_URL = 'https://cases2bbox.app.n8n.cloud/webhook/config-baixa-estoque';
const CFG_GET_URL = 'https://cases2bbox.app.n8n.cloud/webhook/config-baixa-estado';
const REFRESH_MS = 5 * 60 * 1000;   // 5 minutos
const HORA_INI = 7, HORA_FIM = 19;
function dentroDoHorario() { const d = new Date(); const dia = d.getDay(); if (dia === 0 || dia === 6) return false; const h = d.getHours(); return h >= HORA_INI && h < HORA_FIM; }

/* Pipeline de 6 fases + Cancelado (última baia, vermelho) */
const PIPELINE = ['Aguardando', 'Montagem', 'Colagem', 'Finalizado', 'Enviado', 'Entregue', 'Cancelado'];
const PROXIMA  = { 'Aguardando': 'Montagem', 'Montagem': 'Colagem', 'Colagem': 'Finalizado', 'Finalizado': 'Enviado', 'Enviado': 'Entregue' };
const ACAO_LABEL = {
    'Aguardando': 'Iniciar Montagem',
    'Montagem': 'Ir para Colagem',
    'Colagem': 'Finalizar',
    'Finalizado': 'Marcar enviado',
    'Enviado':    'Marcar entregue'
};
const CLS = { 'Aguardando':'aguardando', 'Montagem':'producao1', 'Colagem':'producao2', 'Finalizado':'finalizado', 'Enviado':'enviado', 'Entregue':'entregue', 'Cancelado':'cancelado' };

let pedidos = [];

/* ====== Parsing ====== */
function rowsFromJSON(data) {
    const arr = Array.isArray(data) ? data : [data];
    const objs = arr.map(o => (o && o.json) ? o.json : o).filter(o => o && typeof o === 'object');
    if (!objs.length) return [];
    const header = Object.keys(objs[0]).filter(k => k !== 'row_number');
    return [header, ...objs.map(o => header.map(k => (o[k] !== undefined && o[k] !== null) ? String(o[k]) : ''))];
}
function mapHeaders(header) {
    const h = header.map(x => x.toLowerCase().trim());
    const find = (...keys) => h.findIndex(col => keys.some(k => col.includes(k)));
    return {
        id:       find('id pedido', 'pedido'),
        material: find('material'),
        nomecard: find('nome card', 'card'),
        sku:      find('sku'),
        qtd:      find('qtd', 'quant'),
        cliente:  find('cliente'),
        origem:   find('origem', 'canal', 'fonte'),
        entrada:  find('data_entrada', 'entrada'),
        prazo:    find('prazo', 'entrega', 'limite'),
        status:   find('status', 'situa')
    };
}
function mesPedido(id, entrada) {
    // Mês via ID PEDIDO (prefixo AAAAMM) — mais confiável; fallback na data de entrada
    const mId = String(id || '').match(/^(\d{4})(\d{2})/);
    if (mId) return mId[1] + '-' + mId[2];
    const d = parseDate(entrada);
    if (d) return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
    return '';
}
function parseRows(rows) {
    if (!rows.length) return [];
    const m = mapHeaders(rows[0]);
    const g = (r, i) => (i >= 0 && r[i] !== undefined) ? String(r[i]).trim() : '';
    return rows.slice(1).map(r => ({
        id: g(r, m.id), material: g(r, m.material), nomecard: g(r, m.nomecard),
        sku: g(r, m.sku), qtd: g(r, m.qtd), cliente: g(r, m.cliente),
        origem: g(r, m.origem), entrada: g(r, m.entrada), prazo: g(r, m.prazo),
        status: normalizeStatus(g(r, m.status)),
        mes: mesPedido(g(r, m.id), g(r, m.entrada))
    })).filter(p => p.id && p.status !== null);
}
function normalizeStatus(s) {
    const t = (s || '').toLowerCase();
    if (t.includes('cancel')) return 'Cancelado';
    if (t.includes('entreg')) return 'Entregue';
    if (t.includes('final') || t.includes('pronto') || t.includes('conclu')) return 'Finalizado';
    if (t.includes('envi') || t.includes('despach') || t.includes('postado')) return 'Enviado';
    if (t.includes('aguard') || t.includes('pendente') || t.includes('fila')) return 'Aguardando';
    if (t.includes('colag') || (t.includes('produ') && (t.includes('2') || t.includes('ii') || t.includes('dois')))) return 'Colagem';
    if (t.includes('produ') || t.includes('andamento') || t.includes('fabrica') || t.includes('montag') || t.includes('colag')) return 'Montagem';
    return 'Aguardando';
}
function parseDate(s) {
    if (!s) return null;
    const br = s.match(/(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?/);
    if (br) { let y = br[3] !== undefined ? parseInt(br[3]) : new Date().getFullYear(); if (y < 100) y += 2000; return new Date(y, parseInt(br[2]) - 1, parseInt(br[1])); }
    const d = new Date(s); return isNaN(d) ? null : d;
}
function diasAtraso(p) {
    if (['Finalizado','Enviado','Entregue','Cancelado'].includes(p.status)) return 0;
    const d = parseDate(p.prazo); if (!d) return 0;
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    return d < hoje ? Math.round((hoje - d) / 86400000) : 0;
}
function origemBadge(o) {
    const t = (o || '').toLowerCase();
    if (t.includes('whats') || t.includes('zap')) return ['whatsapp', 'WhatsApp'];
    if (t.includes('mercado') || t === 'ml') return ['mercadolivre', 'Mercado Livre'];
    if (t.includes('shopee')) return ['shopee', 'Shopee'];
    if (t.includes('estoque')) return ['estoque', 'Estoque'];
    if (t.includes('tray') || t.includes('site')) return ['tray', 'Site'];
    return ['outro', o || '—'];
}
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function pedBicolor(id) { const v = esc(id) || '—'; return v.length > 3 ? v.slice(0,-3) + '<span class="ped-fim">' + v.slice(-3) + '</span>' : v; }

/* ====== Fetch + render ====== */
async function fetchData(manual) {
    const btn = document.getElementById('refreshBtn');
    if (!manual && !dentroDoHorario()) { setStatus('fora do horário (seg–sex, 7h–19h) — toque em Atualizar', false); return; }
    if (manual) btn.classList.add('loading');
    try {
        const resp = await fetch(FONTE_DADOS + '&t=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        pedidos = parseRows(rowsFromJSON(data));
        render();
        setStatus('atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}), false);
    } catch (e) {
        setStatus('erro ao carregar — toque em Atualizar', true);
        console.error(e);
    } finally {
        if (manual) setTimeout(() => btn.classList.remove('loading'), 400);
    }
}
function setStatus(msg, err) {
    document.getElementById('statusMsg').textContent = msg;
    document.getElementById('statusLine').classList.toggle('err', !!err);
}

/* Fases "concluídas" filtram pelo mês selecionado; as pendentes de produção aparecem sempre */
const FASES_CONCLUIDAS = ['Enviado', 'Entregue', 'Cancelado'];
let mesSelecionado = '';   // '' = mês atual (definido ao montar o seletor)

function mesAtualStr() {
    const d = new Date();
    return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
}
function rotuloMes(ym) {
    const [a, m] = ym.split('-');
    const nomes = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    return nomes[parseInt(m) - 1] + '/' + a;
}
function montarSeletorMes() {
    const sel = document.getElementById('mesSel');
    const meses = Array.from(new Set(pedidos.map(p => p.mes).filter(Boolean)));
    const atual = mesAtualStr();
    if (!meses.includes(atual)) meses.push(atual);
    meses.sort().reverse();   // mais recente primeiro
    if (!mesSelecionado || !meses.includes(mesSelecionado)) mesSelecionado = meses.includes(atual) ? atual : meses[0];
    sel.innerHTML = meses.map(ym => `<option value="${ym}"${ym === mesSelecionado ? ' selected' : ''}>${rotuloMes(ym)}</option>`).join('');
}
function onMesChange() {
    mesSelecionado = document.getElementById('mesSel').value;
    render();
}
function pedidoVisivel(p) {
    // Concluídos: só do mês selecionado. Pendentes de produção: sempre (precisam ser feitos).
    if (FASES_CONCLUIDAS.includes(p.status)) return p.mes === mesSelecionado;
    return true;
}

function render() {
    montarSeletorMes();
    const visiveis = pedidos.filter(pedidoVisivel);

    const cont = {};
    PIPELINE.forEach(f => cont[f] = 0);
    visiveis.forEach(p => { if (cont[p.status] !== undefined) cont[p.status]++; });
    document.getElementById('pipe').innerHTML = PIPELINE.map(f => `
        <div class="pipe-item ${CLS[f]}">
            <div class="n">${cont[f]}</div>
            <div class="l">${f}</div>
        </div>`).join('');

    let html = '';
    PIPELINE.forEach(fase => {
        const lista = visiveis.filter(p => p.status === fase);
        if (!lista.length) return;
        html += `
            <section class="fase">
                <div class="fase-head ${CLS[fase]}">${fase} <span class="count">${lista.length}</span></div>
                <div class="fase-grid">${lista.map(card).join('')}</div>
            </section>`;
    });
    document.getElementById('content').innerHTML = html ||
        `<div class="empty"><div class="big">—</div>Nenhum pedido encontrado para este mês.</div>`;
}

function card(p) {
    const [oCls, oLabel] = origemBadge(p.origem);
    const ehEstoque = oCls === 'estoque';
    const atraso = diasAtraso(p);
    const ehFinal = (p.status === 'Entregue' || p.status === 'Cancelado');
    const titulo = esc(p.nomecard) || esc(p.sku) || '—';
    const skuTxt = esc(p.sku) || '—';
    const matTxt = esc(p.material) || '—';
    const qtdTxt = p.qtd ? esc(p.qtd) + ' un' : '';
    const cardCls = ehEstoque ? 'estoque' : CLS[p.status];
    const btnCls = ehEstoque ? 'fase-estoque' : ('fase-' + CLS[p.status]);

    const chips = PIPELINE.map(f =>
        `<span class="chip ${f === p.status ? 'atual' : ''} ${f === 'Cancelado' ? 'cancelar' : ''}" onclick="event.stopPropagation(); definir('${esc(p.id)}','${f}','${esc(p.cliente)}')">${f}</span>`
    ).join('');

    return `
    <div class="card ${cardCls}" id="card-${esc(p.id)}">
        <div class="card-top">
            <div class="card-title">${titulo}</div>
            <span class="badge-origem ${oCls}">${esc(oLabel)}</span>
        </div>
        <div class="card-skuline">
            <span class="sku">${skuTxt}</span>
            <span class="sep"></span>
            <span class="mat">${matTxt}</span>
            ${qtdTxt ? '<span class="qtd">' + qtdTxt + '</span>' : ''}
        </div>
        <div class="card-idcli">
            <span class="ped"><span class="ped-label">PED:</span> ${pedBicolor(p.id)}</span>
            <span class="cli">👤 ${esc(p.cliente) || 'Cliente não informado'}</span>
        </div>
        <div class="card-meta">
            <span>Entrada: <strong>${esc(p.entrada) || '—'}</strong></span>
            <span>Prazo: <strong>${esc(p.prazo) || '—'}</strong></span>
            ${atraso > 0 ? `<span class="atraso">⚠ ${atraso}d atrasado</span>` : ''}
        </div>
        ${ehFinal ? '' : `<button class="btn-avancar ${btnCls}" onclick="avancar('${esc(p.id)}','${p.status}','${esc(p.cliente)}')">
            ${ACAO_LABEL[p.status]} <span class="arrow">→</span>
        </button>`}
        <div class="corrigir-toggle" onclick="toggleCorrigir('${esc(p.id)}')">corrigir fase ⌄</div>
        <div class="corrigir-box" id="corr-${esc(p.id)}">
            <div class="corrigir-label">Mudar para qualquer fase</div>
            <div class="chips">${chips}</div>
        </div>
    </div>`;
}

function toggleCorrigir(id) { document.getElementById('corr-' + id).classList.toggle('open'); }

/* ====== Ações ====== */
function avancar(id, atual, cliente) { mudarFase(id, PROXIMA[atual], cliente); }
function definir(id, fase, cliente) {
    if (fase === 'Cancelado') {
        if (!confirm('Cancelar o pedido ' + id + ' (' + cliente + ')?')) return;
    }
    mudarFase(id, fase, cliente);
}
async function mudarFase(id, novo, cliente) {
    const cardEl = document.getElementById('card-' + id);
    if (cardEl) cardEl.classList.add('busy');
    try {
        const body = new URLSearchParams({ id, status: novo, token: CMD_TOKEN });
        const resp = await fetch(CMD_URL, { method: 'POST', body });
        const data = await resp.json().catch(() => ({}));
        if (resp.ok && data.ok) {
            toast(id + ' → ' + novo, 'ok');
            await fetchData(false);
        } else {
            throw new Error(data.msg || ('HTTP ' + resp.status));
        }
    } catch (e) {
        toast('Falhou: ' + e.message + '. Tente de novo.', 'err');
        if (cardEl) cardEl.classList.remove('busy');
        console.error(e);
    }
}

let toastTimer = null;
function toast(msg, tipo) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + (tipo || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = (tipo || ''); }, 2600);
}

/* ====== Config: baixa automática de estoque ====== */
let baixaLigada = null, baixaBusy = false;
function toggleConfig() { document.getElementById('configPanel').classList.toggle('open'); }
async function carregarEstadoBaixa() {
    try {
        const resp = await fetch(CFG_GET_URL + '?t=' + Date.now());
        const data = await resp.json();
        baixaLigada = !!data.ligado;
        document.getElementById('switchEstoque').classList.toggle('on', baixaLigada);
    } catch (e) { console.error('estado baixa', e); }
}
async function toggleEstoque() {
    if (baixaBusy) return;
    const sw = document.getElementById('switchEstoque');
    const novo = !(baixaLigada === true);
    baixaBusy = true; sw.classList.add('loading');
    try {
        const body = new URLSearchParams({ token: CMD_TOKEN, valor: novo ? 'SIM' : 'NAO' });
        const resp = await fetch(CFG_SET_URL, { method: 'POST', body });
        const data = await resp.json().catch(() => ({}));
        if (resp.ok && data.ok) {
            baixaLigada = (String(data.valor).toUpperCase() === 'SIM');
            sw.classList.toggle('on', baixaLigada);
            toast(baixaLigada ? 'Baixa de estoque LIGADA' : 'Baixa de estoque DESLIGADA', baixaLigada ? 'ok' : '');
        } else { throw new Error(data.erro || ('HTTP ' + resp.status)); }
    } catch (e) { toast('Falhou: ' + e.message, 'err'); console.error(e); }
    finally { baixaBusy = false; sw.classList.remove('loading'); }
}

/* ====== Init ====== */
carregarEstadoBaixa();
fetchData(true);   // 1a carga sempre busca (mesmo fora do horário)
setInterval(() => fetchData(false), REFRESH_MS);
</script>
