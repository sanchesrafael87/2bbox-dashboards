/* ===== FETCH GOOGLE SHEETS VIA CSV ===== */
function sheetUrl(name) {
  return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(name) + '&t=' + Date.now();
}

function parseCsv(text) {
  var rows = [], row = [], cell = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i], n = text[i+1];
    if (inQ) {
      if (c === '"' && n === '"') { cell += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n' || (c === '\r' && n === '\n')) {
        row.push(cell); cell = ''; rows.push(row); row = [];
        if (c === '\r') i++;
      } else { cell += c; }
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function csvToObjects(text) {
  var rows = parseCsv(text);
  if (rows.length < 2) return [];
  var headers = rows[0].map(function(h) { return h.trim(); });
  var result = [];
  for (var i = 1; i < rows.length; i++) {
    if (rows[i].length === 0 || (rows[i].length === 1 && !rows[i][0])) continue;
    var obj = {};
    for (var j = 0; j < headers.length; j++) {
      obj[headers[j]] = (rows[i][j] || '').trim();
    }
    result.push(obj);
  }
  return result;
}

function fetchSheet(name) {
  return fetch(sheetUrl(name)).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  }).then(csvToObjects);
}

/* ===== PROCESS CONVERSATIONS (same logic as n8n) ===== */
function processData(botRows, atdRows) {
  var dismissedSet = new Set();
  try {
    atdRows.forEach(function(r) {
      dismissedSet.add((r.session_id||'') + '|' + (r.tipo||'') + '|' + (r.card_timestamp||''));
    });
  } catch(e) {}

  var sessionsMap = {}, escalacoes = [], pedidos = [];
  var seenEsc = new Set(), seenPed = new Set();

  botRows.forEach(function(row) {
    var sessionId = row.session_id || 'unknown';
    var tel = row.telefone != null ? String(row.telefone) : '';
    var produtoRow = row.produto_buscado || row.produto || '';
    var modeloRow = row.modelo_escolhido || row.modelo_case || '';

    if (!sessionsMap[sessionId]) {
      sessionsMap[sessionId] = {
        id: 'conv_' + sessionId.replace(/[^a-zA-Z0-9]/g, '_'),
        phone: tel,
        customerName: row.nome_cliente || 'Cliente',
        startedAt: row.timestamp || '',
        lastMessageAt: row.timestamp || '',
        action: row.acao || '',
        status: row.status_conversa || 'em_andamento',
        product: produtoRow,
        modelo: modeloRow,
        via_shortcut: row.via_atalho || 'NAO',
        messages: []
      };
    }
    var session = sessionsMap[sessionId];
    if (row.timestamp && row.timestamp > session.lastMessageAt) {
      session.lastMessageAt = row.timestamp;
      session.action = row.acao || session.action;
      session.status = row.status_conversa || session.status;
      session.product = produtoRow || session.product;
      session.modelo = modeloRow || session.modelo;
      session.via_shortcut = row.via_atalho || session.via_shortcut;
    }
    if (row.nome_cliente && String(row.nome_cliente).trim()) session.customerName = row.nome_cliente;
    if (tel && tel.trim()) session.phone = tel;

    var timeStr = '';
    try {
      var d = new Date(row.timestamp);
      timeStr = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' });
    } catch(e) {}

    if (row.mensagem_cliente) {
      session.messages.push({ id: session.messages.length + 1, from: 'customer', text: row.mensagem_cliente, time: timeStr });
    }
    if (row.resposta_bot) {
      session.messages.push({ id: session.messages.length + 1, from: 'bot', text: row.resposta_bot, time: timeStr });
    }

    var acao = String(row.acao || '').toUpperCase();
    var status = String(row.status_conversa || '').toLowerCase();
    var isEsc = acao.includes('NOTIFICACAO_COMERCIAL_ESCALACAO') || acao === 'ESCALAR_HUMANO' || status === 'escalado' || status === 'escalado_timeout';
    var isPed = acao.includes('NOTIFICACAO_COMERCIAL_PEDIDO') || status === 'pedido_confirmado' || status === 'aguardando_comercial';
    var eventKey = sessionId + '|' + (row.twilio_message_sid || row.timestamp || row.mensagem_cliente || '');

    var tsFmt = '';
    try {
      var d2 = new Date(row.timestamp);
      tsFmt = d2.toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    } catch(e) {}

    if (isEsc && !seenEsc.has(eventKey)) {
      seenEsc.add(eventKey);
      escalacoes.push({
        timestamp: row.timestamp || '', timeFormatted: tsFmt, phone: tel,
        customerName: row.nome_cliente || 'Cliente', product: produtoRow, modelo: modeloRow,
        lastMessage: row.mensagem_cliente || '', botResponse: row.resposta_bot || '',
        sessionId: sessionId, convId: 'conv_' + sessionId.replace(/[^a-zA-Z0-9]/g, '_'),
        tipo: (status === 'escalado_timeout' ? 'timeout' : 'direto')
      });
    }
    if (isPed && !seenPed.has(eventKey)) {
      seenPed.add(eventKey);
      pedidos.push({
        timestamp: row.timestamp || '', timeFormatted: tsFmt, phone: tel,
        customerName: row.nome_cliente || 'Cliente', product: produtoRow, modelo: modeloRow,
        lastMessage: row.mensagem_cliente || '', botResponse: row.resposta_bot || '',
        sessionId: sessionId, convId: 'conv_' + sessionId.replace(/[^a-zA-Z0-9]/g, '_')
      });
    }
  });

  var conversations = Object.values(sessionsMap);
  conversations.sort(function(a, b) { return new Date(b.lastMessageAt) - new Date(a.lastMessageAt); });
  escalacoes.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });
  pedidos.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });

  var escFiltradas = escalacoes.filter(function(e) { return !dismissedSet.has(e.sessionId + '|escalacao|' + e.timestamp); });
  var pedFiltrados = pedidos.filter(function(p) { return !dismissedSet.has(p.sessionId + '|pedido|' + p.timestamp); });

  return { conversations: conversations, escalacoes: escFiltradas, pedidos: pedFiltrados };
}

/* ===== FETCH + RENDER ===== */
function loadData(silent) {
  if (!silent) {
    var ov = document.getElementById('loading-overlay');
    if (ov) ov.style.display = 'flex';
  }
  try { document.querySelector('.btn-refresh').classList.add('spinning'); } catch(e) {}

  Promise.all([fetchSheet(SHEET_BOT), fetchSheet(SHEET_ATD)])
    .then(function(results) {
      var data = processData(results[0], results[1]);
      AC = data.conversations;
      renderEscalacoes(data.escalacoes);
      renderPedidos(data.pedidos);
      applyFilters();
      var now = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
      document.getElementById('updated-at').textContent = 'atualizado ' + now;
    })
    .catch(function(err) {
      showError('Erro ao carregar dados', err.message);
    })
    .finally(function() {
      var ov = document.getElementById('loading-overlay');
      if (ov) ov.style.display = 'none';
      try { document.querySelector('.btn-refresh').classList.remove('spinning'); } catch(e) {}
    });
}

/* ===== UI HELPERS ===== */
function showError(t, d) {
  var x = document.querySelector('.error-banner');
  if (x) x.remove();
  var b = document.createElement('div');
  b.className = 'error-banner';
  b.innerHTML = '<div><div class=err-title>' + t + '</div><div class=err-detail>' + d + '</div></div><button id=btn-reload>Recarregar</button>';
  document.body.insertBefore(b, document.body.firstChild);
  document.getElementById('btn-reload').addEventListener('click', function() { location.reload(); });
}

function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function fmtDate(s) {
  if (!s) return '';
  try {
    var d = new Date(s), t = new Date(), y = new Date(t);
    y.setDate(y.getDate() - 1);
    if (d.toDateString() === t.toDateString()) return 'Hoje';
    if (d.toDateString() === y.toDateString()) return 'Ontem';
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
  } catch(e) { return s; }
}

function fmtFull(s) {
  if (!s) return '';
  try { return new Date(s).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
  catch(e) { return s; }
}

function maskPhone(p) {
  p = String(p || '');
  if (p.length >= 8) return p.slice(0, 4) + '****' + p.slice(-4);
  return p;
}

/* ===== ESCALACOES RENDER ===== */
function renderEscalacoes(list) {
  var el = document.getElementById('esc-list');
  document.getElementById('esc-count').textContent = list.length;
  if (!list.length) { el.innerHTML = '<div class=esc-empty>Nenhuma escalacao pendente.</div>'; return; }
  el.innerHTML = list.map(function(e) {
    return '<div class=esc-card data-conv="' + esc(e.convId) + '">' +
      '<div class=et>&#128226; ' + esc(e.timeFormatted) + '<span class="etype ' + e.tipo + '">' + (e.tipo === 'timeout' ? 'Timeout' : 'Direto') + '</span></div>' +
      '<div class=ei><span class=en>' + esc(e.customerName) + '</span><span class=ep>' + maskPhone(e.phone) + '</span></div>' +
      '<div class=em>&#128172; "' + esc((e.lastMessage || e.botResponse || '').slice(0, 80)) + '"</div>' +
      (e.product ? '<div class=epr>&#128230; ' + esc(e.product) + '</div>' : '') +
      '<button class=dismiss-btn onclick="event.stopPropagation();openDismiss(this)" data-session="' + esc(e.sessionId) + '" data-tipo="escalacao" data-nome="' + esc(e.customerName) + '" data-tel="' + maskPhone(e.phone) + '" data-prod="' + esc(e.product) + '" data-ts="' + esc(e.timestamp) + '">&#10006; Dispensar</button></div>';
  }).join('');
  bindCardClicks(el);
}

function renderPedidos(list) {
  var el = document.getElementById('ped-list');
  document.getElementById('ped-count').textContent = list.length;
  if (!list.length) { el.innerHTML = '<div class=ped-empty>Nenhum pedido pendente.</div>'; return; }
  el.innerHTML = list.map(function(p) {
    return '<div class=ped-card data-conv="' + esc(p.convId) + '">' +
      '<div class=pt>&#128230; ' + esc(p.timeFormatted) + '</div>' +
      '<div class=pi><span class=pn>' + esc(p.customerName) + '</span><span class=pp>' + maskPhone(p.phone) + '</span></div>' +
      (p.product ? '<div class=ppr>' + esc(p.product) + (p.modelo ? ' (' + esc(p.modelo) + ')' : '') + '</div>' : '') +
      '<button class=dismiss-btn onclick="event.stopPropagation();openDismiss(this)" data-session="' + esc(p.sessionId) + '" data-tipo="pedido" data-nome="' + esc(p.customerName) + '" data-tel="' + maskPhone(p.phone) + '" data-prod="' + esc(p.product) + '" data-ts="' + esc(p.timestamp) + '">&#10006; Concluir</button></div>';
  }).join('');
  bindCardClicks(el);
}

function bindCardClicks(container) {
  var cards = container.querySelectorAll('[data-conv]');
  for (var i = 0; i < cards.length; i++) {
    (function(c) { c.addEventListener('click', function() { selectConv(c.getAttribute('data-conv')); }); })(cards[i]);
  }
}

/* ===== FILTERS + CONVERSATION LIST ===== */
function applyFilters() {
  var q = document.getElementById('search-input').value.toLowerCase();
  var fa = document.getElementById('filter-action').value;
  var fs = document.getElementById('filter-status').value;
  filtered = AC.filter(function(c) {
    var m = q === '' || (c.customerName || '').toLowerCase().indexOf(q) >= 0 || (c.phone || '').indexOf(q) >= 0 || (c.product || '').toLowerCase().indexOf(q) >= 0 || (c.messages || []).some(function(x) { return (x.text || '').toLowerCase().indexOf(q) >= 0; });
    return m && (!fa || c.action === fa) && (!fs || c.status === fs);
  });
  renderStats();
  renderList();
}

function renderStats() {
  var t = filtered.length, m = filtered.reduce(function(a, c) { return a + (c.messages || []).length; }, 0);
  document.getElementById('stats-bar').innerHTML = [{ l: 'Conversas', v: t }, { l: 'Mensagens', v: m }].map(function(s) {
    return '<div class=stat-card><div class=label>' + s.l + '</div><div class=value>' + s.v + '</div></div>';
  }).join('');
}

function renderList() {
  var el = document.getElementById('conv-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div class=empty-state>' + (AC.length === 0 ? 'Nenhuma conversa na planilha' : 'Nenhuma conversa corresponde ao filtro') + '</div>';
    document.getElementById('sidebar-footer').textContent = '';
    return;
  }
  el.innerHTML = filtered.map(function(c) {
    var al = AL[c.action] || { label: c.action || '-', color: '#94a3b8', bg: 'rgba(148,163,184,0.12)' };
    var sl = SL[c.status] || { label: c.status || '-', color: '#94a3b8' };
    var msgs = c.messages || [], last = msgs[msgs.length - 1];
    var prev = last ? (last.from === 'bot' ? 'Bot: ' : 'Cliente: ') + esc((last.text || '').slice(0, 55)) : 'Sem msgs';
    return '<div class="conv-item' + (c.id === selId ? ' active' : '') + '" data-id="' + esc(c.id) + '"><div style="display:flex;justify-content:space-between"><span class=name>' + esc(c.customerName || 'Cliente') + '</span><span style="font-size:11px;color:#64748b">' + fmtDate(c.startedAt) + '</span></div><div class=phone>' + (c.phone || '') + '</div><div class=preview>' + prev + '</div><div class=tags><span class=action-badge style="color:' + al.color + ';background:' + al.bg + '">' + al.label + '</span>' + (c.status ? '<span class=status-dot style="color:' + sl.color + '">&bull; ' + sl.label + '</span>' : '') + (c.via_shortcut === 'SIM' ? '<span class=shortcut-badge>&#9989; atalho</span>' : '') + '</div></div>';
  }).join('');
  document.getElementById('sidebar-footer').textContent = filtered.length + ' de ' + AC.length + ' conversas';
}

/* ===== SELECT CONVERSATION ===== */
function selectConv(id) {
  selId = id;
  renderList();
  var c = AC.find(function(x) { return x.id === id; });
  if (!c) return;
  var al = AL[c.action] || { label: c.action || '-', color: '#94a3b8', bg: 'rgba(148,163,184,0.12)' };
  var sl = SL[c.status] || { label: c.status || '-', color: '#94a3b8' };
  var msgs = c.messages || [];
  var dur;
  try { var s2 = new Date(c.startedAt), e2 = new Date(c.lastMessageAt), dd = Math.round((e2 - s2) / 60000); dur = isNaN(dd) ? '-' : dd + ' min'; } catch(e) { dur = '-'; }

  document.getElementById('chat-area').innerHTML =
    '<div class=chat-header><div style="display:flex;align-items:center"><div class=avatar>&#128100;</div><div class=chat-header-info><div class=cname>' + esc(c.customerName || 'Cliente') + '</div><div class=cphone>' + (c.phone || '') + '</div></div></div><div class=chat-header-badges><span class=hbadge style="color:' + al.color + ';background:' + al.bg + '">' + al.label + '</span><span class=hbadge style="color:' + sl.color + ';background:rgba(0,0,0,0.2);border:1px solid ' + sl.color + '40">&bull; ' + sl.label + '</span></div></div>' +
    '<div class=chat-date>' + fmtFull(c.startedAt) + (c.product ? '<span style="margin-left:8px;font-size:10px;background:rgba(255,255,255,0.06);border-radius:6px;padding:2px 8px;color:#94a3b8">' + esc(c.product) + (c.modelo ? ' (' + esc(c.modelo) + ')' : '') + '</span>' : '') + '</div>' +
    '<div class=chat-messages id=chat-msgs>' + (msgs.length === 0 ? '<div style="text-align:center;color:#475569;padding:24px;font-size:13px">Nenhuma mensagem registrada</div>' : msgs.map(function(m) {
      var isBot = m.from === 'bot';
      return '<div class="bubble-wrap ' + (isBot ? 'bot' : 'customer') + '">' + (isBot ? '<div class="bubble-avatar bot-av">&#129302;</div>' : '') + '<div class="bubble ' + (isBot ? 'bot' : 'customer') + '"><p>' + esc(m.text) + '</p><div class=btime>' + (m.time || '') + '</div></div>' + (!isBot ? '<div class="bubble-avatar cust-av">&#128100;</div>' : '') + '</div>';
    }).join('')) + '</div>' +
    '<div class=chat-footer><span>' + msgs.length + ' msgs</span><span>' + dur + '</span><span>' + msgs.filter(function(m) { return m.from === 'bot'; }).length + ' respostas bot</span>' + (c.via_shortcut === 'SIM' ? '<span>&#9989; Atalho</span>' : '') + '</div>';

  setTimeout(function() { var m2 = document.getElementById('chat-msgs'); if (m2) m2.scrollTop = m2.scrollHeight; }, 50);
}
window.selectConv = selectConv;

/* ===== DISMISS ===== */
function openDismiss(btn) {
  var d = btn.dataset;
  var ov = document.createElement('div');
  ov.className = 'dismiss-modal-overlay';
  var tit = (d.tipo === 'escalacao') ? 'Dispensar Escalacao' : 'Concluir Pedido';
  var sub = (d.nome || 'Cliente') + ' - ' + (d.tel || '');
  ov.innerHTML = '<div class=dismiss-modal><h3>' + tit + '</h3><div class=dm-sub>' + sub + '</div><textarea id=dm-msg placeholder=Observacao...></textarea><div class=dm-actions><button class=dm-cancel id=dm-cancel>Cancelar</button><button class=dm-confirm id=dm-ok>Confirmar</button></div><div class=dm-status id=dm-status></div></div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(ev) { if (ev.target === ov) ov.remove(); });
  document.getElementById('dm-cancel').addEventListener('click', function() { ov.remove(); });
  document.getElementById('dm-ok').addEventListener('click', function() {
    var okBtn = this;
    okBtn.disabled = true;
    okBtn.textContent = 'Enviando...';
    var stEl = document.getElementById('dm-status');
    var msg = document.getElementById('dm-msg').value;
    fetch(DISMISS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tipo: d.tipo, nome_cliente: d.nome, telefone: d.tel, produto: d.prod, session_id: d.session, mensagem_dismiss: msg, quem_dispensou: 'admin', card_timestamp: d.ts })
    }).then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(res) {
      if (res.success) {
        var card = btn.closest('.esc-card,.ped-card');
        if (card) card.style.display = 'none';
        var ec2 = document.querySelectorAll('.esc-card'), pc2 = document.querySelectorAll('.ped-card'), ev2 = 0, pv2 = 0;
        for (var i = 0; i < ec2.length; i++) { if (ec2.item(i).style.display !== 'none') ev2++; }
        for (var j = 0; j < pc2.length; j++) { if (pc2.item(j).style.display !== 'none') pv2++; }
        document.getElementById('esc-count').textContent = ev2;
        document.getElementById('ped-count').textContent = pv2;
        if (ev2 === 0) { var el = document.querySelector('.esc-list'); if (el) el.innerHTML = '<div class=esc-empty>Nenhuma escalacao pendente.</div>'; }
        if (pv2 === 0) { var pl = document.querySelector('.ped-list'); if (pl) pl.innerHTML = '<div class=ped-empty>Nenhum pedido pendente.</div>'; }
        ov.remove();
      } else { stEl.style.color = '#ef4444'; stEl.textContent = 'Erro: ' + (res.message || 'Falha'); okBtn.disabled = false; okBtn.textContent = 'Confirmar'; }
    }).catch(function(err) { stEl.style.color = '#ef4444'; stEl.textContent = 'Erro: ' + err.message; okBtn.disabled = false; okBtn.textContent = 'Confirmar'; });
  });
}
window.openDismiss = openDismiss;

/* ===== PANELS ===== */
function setupPanel(tId, pId) {
  var t = document.getElementById(tId), p = document.getElementById(pId);
  if (!t || !p) return;
  t.addEventListener('click', function() { t.classList.toggle('open'); p.classList.toggle('open'); });
}
setupPanel('esc-toggle', 'esc-panel');
setupPanel('ped-toggle', 'ped-panel');

/* ===== LOGIN ===== */
function doLogin() {
  var pw = document.getElementById('pw-input').value;
  if (pw === '2bbox2026') {
    try { sessionStorage.setItem('pb_auth', '1'); } catch(e) {}
    enterApp();
  } else {
    document.getElementById('pw-input').classList.add('error');
    document.getElementById('err-msg').style.display = 'block';
    var box = document.getElementById('login-box');
    box.style.animation = 'shake 0.5s ease-in-out';
    setTimeout(function() { box.style.animation = ''; }, 500);
  }
}
function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadData(false);
  refreshTimer = setInterval(function() { loadData(true); }, REFRESH_MS);
}

document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('pw-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('pw-input').addEventListener('input', function() {
  document.getElementById('pw-input').classList.remove('error');
  document.getElementById('err-msg').style.display = 'none';
});
try { if (sessionStorage.getItem('pb_auth') === '1') enterApp(); } catch(e) {}

/* ===== REFRESH BUTTON ===== */
document.getElementById('btn-refresh').addEventListener('click', function() { loadData(false); });

/* ===== CONVERSATION CLICK ===== */
document.getElementById('conv-list').addEventListener('click', function(ev) {
  var item = ev.target.closest('.conv-item');
  if (item && item.dataset.id) selectConv(item.dataset.id);
});

/* ===== FILTER LISTENERS ===== */
document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('filter-action').addEventListener('change', applyFilters);
document.getElementById('filter-status').addEventListener('change', applyFilters);

})();
</script>
