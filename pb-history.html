<title>PedroBot - Historico - 2BBOX</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; font-family: 'DM Sans', sans-serif; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
.error-banner{position:fixed;top:0;left:0;right:0;background:#7f1d1d;border-bottom:1px solid #ef4444;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-size:13px}.error-banner .err-title{color:#fca5a5;font-weight:600;margin-bottom:2px}.error-banner .err-detail{color:#fecaca;font-size:12px;font-family:monospace}.error-banner button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:999}.login-box{background:rgba(30,41,59,0.8);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:48px 40px;width:380px;text-align:center}.login-box h1{font-family:'Space Mono',monospace;font-weight:700;font-size:22px;color:#f8fafc;margin:8px 0 4px}.login-box p{color:#94a3b8;font-size:13px;margin-bottom:32px}.login-box input{width:100%;padding:14px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);background:rgba(15,23,42,0.6);color:#f8fafc;font-size:15px;outline:none;font-family:'DM Sans',sans-serif}.login-box input.error{border-color:#ef4444}.login-box .err-msg{color:#ef4444;font-size:12px;margin-top:8px;display:none}.login-box button{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:16px;font-family:'DM Sans',sans-serif}.login-box small{display:block;color:#475569;font-size:11px;margin-top:24px}
#app{display:none;flex-direction:column;height:100vh}.topbar{padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;background:rgba(15,23,42,0.95);backdrop-filter:blur(10px);flex-shrink:0}.topbar-left{display:flex;align-items:center;gap:12px}.topbar-left h1{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;letter-spacing:-0.5px;color:#f8fafc;line-height:1.2}.topbar-left span.sub{font-size:11px;color:#64748b;display:block}.topbar-right{display:flex;align-items:center;gap:12px}.updated-at{font-size:10px;color:#334155}.btn-refresh{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 12px;cursor:pointer;color:#94a3b8;font-size:13px;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:background 0.15s}.btn-refresh:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}.btn-refresh.spinning svg{animation:spin 1s linear infinite}.online-dot{width:6px;height:6px;border-radius:50%;background:#25D366;box-shadow:0 0 8px #25D366;display:inline-block;animation:pulse 2s infinite}.badge-2bbox{background:rgba(255,255,255,0.06);border-radius:8px;padding:4px 12px;font-size:11px;color:#94a3b8;font-weight:500}
.stats-bar{display:flex;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto;flex-shrink:0}.stat-card{background:rgba(255,255,255,0.04);border-radius:12px;padding:10px 16px;min-width:100px;flex:1}.stat-card .label{font-size:11px;color:#64748b;margin-bottom:2px}.stat-card .value{font-size:22px;font-weight:700;color:#f1f5f9;font-family:'Space Mono',monospace}
.main{flex:1;display:flex;overflow:hidden}.sidebar{width:360px;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;flex-shrink:0}.filters{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}.filters input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px}.filters-row{display:flex;gap:8px}.filters-row select{flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(15,23,42,0.8);color:#94a3b8;font-size:12px;outline:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.conv-list{flex:1;overflow-y:auto}.conv-item{padding:14px 20px;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid rgba(255,255,255,0.04);transition:all 0.15s}.conv-item:hover{background:rgba(255,255,255,0.03)}.conv-item.active{border-left-color:#25D366;background:rgba(37,211,102,0.06)}.conv-item .name{color:#f1f5f9;font-weight:600;font-size:14px}.conv-item .phone{color:#64748b;font-size:12px;margin:4px 0}.conv-item .preview{color:#94a3b8;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}.conv-item .tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.action-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px}.status-dot{font-size:10px}.shortcut-badge{font-size:10px;color:#475569}.sidebar-footer{padding:10px 16px;border-top:1px solid rgba(255,255,255,0.04);font-size:10px;color:#334155;text-align:center}.empty-state{padding:32px;text-align:center;color:#475569;font-size:13px}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#334155;gap:12px}.chat-empty span{font-size:48px}.chat-empty p{font-size:14px}.chat-header{padding:14px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.chat-header .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1e293b,#334155);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px}.chat-header-info{margin-left:12px}.chat-header-info .cname{color:#f1f5f9;font-weight:600;font-size:15px}.chat-header-info .cphone{color:#64748b;font-size:12px}.chat-header-badges{display:flex;gap:8px}.chat-header-badges .hbadge{font-size:11px;font-weight:600;padding:4px 12px;border-radius:8px}.chat-date{text-align:center;padding:12px;font-size:11px;color:#475569}.chat-messages{flex:1;overflow-y:auto;padding:8px 0 16px}.bubble-wrap{display:flex;padding:0 20px;margin-bottom:12px}.bubble-wrap.bot{justify-content:flex-start}.bubble-wrap.customer{justify-content:flex-end}.bubble-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;align-self:flex-end}.bubble-avatar.bot-av{background:linear-gradient(135deg,#25D366,#128C7E);margin-right:8px}.bubble-avatar.cust-av{background:rgba(255,255,255,0.08);margin-left:8px}.bubble{max-width:72%;padding:10px 14px}.bubble.bot{background:rgba(255,255,255,0.06);border-radius:4px 16px 16px 16px;border:1px solid rgba(255,255,255,0.06)}.bubble.customer{background:rgba(37,211,102,0.15);border-radius:16px 4px 16px 16px;border:1px solid rgba(37,211,102,0.2)}.bubble p{color:#e2e8f0;font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}.bubble .btime{font-size:10px;color:#475569;text-align:right;margin-top:4px}.chat-footer{padding:10px 24px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:20px;color:#475569;font-size:11px;flex-shrink:0}
</style>
