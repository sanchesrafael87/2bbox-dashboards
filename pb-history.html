// ===== UTILS =====
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function waLink(phone) {
  var p = String(phone || '').replace(/[^0-9]/g, '');
  if (!p) return '';
  return '<a href="https://wa.me/' + p + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">' + p + '</a>';
}

function waLinkStyled(phone, color) {
  var p = String(phone || '').replace(/[^0-9]/g, '');
  if (!p) return '';
  return '<a href="https://wa.me/' + p + '" target="_blank" rel="noopener" style="color:' + (color || 'inherit') + ';text-decoration:none">' + p + '</a>';
}

function showError(t, d) {
  var x = document.querySelector('.error-banner');
  if (x) x.remove();
  var b = document.createElement('div');
  b.className = 'error-banner';
  b.innerHTML = '<div><div class=err-title>' + t + '</div><div class=err-detail>' + d + '</div></div><button id=btn-reload>Recarregar</button>';
  document.body.insertBefore(b, document.body.firstChild);
  document.getElementById('btn-reload').addEventListener('click', function(){ location.reload(); });
}

window.onerror = function(msg, src, line, col, err) {
  showError('Erro inesperado', (err ? err.message : msg) + ' (linha ' + line + ')');
  return false;
};

function fmtDate(s) {
  if (!s) return '';
  try {
    var d = new Date(s), t = new Date(), y = new Date(t);
    y.setDate(y.getDate() - 1);
    if (d.toDateString() === t.toDateString()) return 'Hoje';
    if (d.toDateString() === y.toDateString()) return 'Ontem';
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
  } catch(e) { return s; }
}

function fmtFull(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch(e) { return s; }
}

function fmtTime(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
  } catch(e) { return ''; }
}

function fmtDateTime(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  } catch(e) { return ''; }
}

function resolvePhone(telefone, session_id) {
  var tel = String(telefone || '');
  if (tel.indexOf('*') >= 0 && session_id) {
    return String(session_id).replace('whatsapp:', '').replace(/[^0-9]/g, '');
  }
  return tel.replace(/[^0-9]/g, '');
}

// ===== SUPABASE FETCH =====
function supaGet(table, params) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?' + params, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

// ===== DATA PROCESSING =====
function processData(rows, dismissSet) {
  var sessMap = {};
  var escSeen = {};
  var pedSeen = {};
  var escList = [];
  var pedList = [];

  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var sid = r.session_id || '?';
    var ts = r.evento_at || r.timestamp_raw || '';
    var rawTel = String(r.telefone || '');
    var tel = resolvePhone(rawTel, r.session_id);
    var ac = (r.acao || '').toUpperCase();
    var st = (r.status_conversa || '').toLowerCase();

    // Build conversation map
    if (!sessMap[sid]) {
      sessMap[sid] = {
        id: sid,
        customerName: r.nome_cliente || 'Cliente',
        phone: tel,
        startedAt: ts,
        lastMessageAt: ts,
        action: r.acao || '',
        status: r.status_conversa || '',
        product: r.produto || '',
        modelo: r.modelo_case || '',
        via_shortcut: r.via_atalho || '',
        messages: []
      };
    }
    var conv = sessMap[sid];
    if (ts > conv.lastMessageAt) {
      conv.lastMessageAt = ts;
      if (r.acao) conv.action = r.acao;
      if (r.status_conversa) conv.status = r.status_conversa;
      if (r.produto) conv.product = r.produto;
      if (r.modelo_case) conv.modelo = r.modelo_case;
    }
    if (r.nome_cliente && r.nome_cliente !== 'Cliente') conv.customerName = r.nome_cliente;
    if (tel) conv.phone = tel;
    if (r.via_atalho === 'SIM') conv.via_shortcut = 'SIM';

    var tm = fmtTime(ts);
    if (r.mensagem_cliente) conv.messages.push({ from: 'customer', text: r.mensagem_cliente, time: tm });
    if (r.resposta_bot) conv.messages.push({ from: 'bot', text: r.resposta_bot, time: tm });

    // Detect escalacoes (dedup by session_id)
    var isEsc = ac.indexOf('NOTIFICACAO_COMERCIAL_ESCALACAO') >= 0 || ac === 'ESCALAR_HUMANO' || ac === 'ESCALADO' || ac === 'MEDIA_ESCALADA' || ac === 'PEDIDO_HUMANO_ESCALADO' || ac === 'FOLLOWUP_ESCALADO' || ac === 'POS_COMPRA_ESCALADO' || ac === 'ESCALADO_MANUAL_RETROATIVO' || st === 'escalado' || st === 'escalado_timeout' || st === 'escalado_comercial';
    if (isEsc && !escSeen[sid]) {
      escSeen[sid] = true;
      // Check dismiss: any dismiss_key starting with session_id|escalacao|
      var dismissed = false;
      dismissSet.forEach(function(k) {
        if (k.indexOf(sid + '|escalacao|') === 0) dismissed = true;
      });
      if (!dismissed) {
        escList.push({
          convId: sid,
          sessionId: sid,
          timestamp: ts,
          timeFormatted: fmtDateTime(ts),
          phone: tel,
          customerName: r.nome_cliente || 'Cliente',
          product: r.produto || '',
          modelo: r.modelo_case || '',
          lastMessage: r.mensagem_cliente || '',
          tipo: st === 'escalado_timeout' ? 'timeout' : 'direto'
        });
      }
    }

    // Detect pedidos (dedup by session_id)
    var isPed = ac.indexOf('NOTIFICACAO_COMERCIAL_PEDIDO') >= 0 || ac === 'PEDIDO_CONFIRMADO' || ac === 'PEDIDO_CUSTOM_CONFIRMADO' || st === 'pedido_confirmado' || st === 'aguardando_comercial';
    if (isPed && !pedSeen[sid]) {
      pedSeen[sid] = true;
      var dismissed2 = false;
      dismissSet.forEach(function(k) {
        if (k.indexOf(sid + '|pedido|') === 0) dismissed2 = true;
      });
      if (!dismissed2) {
        pedList.push({
          convId: sid,
          sessionId: sid,
          timestamp: ts,
          timeFormatted: fmtDateTime(ts),
          phone: tel,
          customerName: r.nome_cliente || 'Cliente',
          product: r.produto || '',
          modelo: r.modelo_case || ''
        });
      }
    }
  }

  AC = Object.values(sessMap).sort(function(a, b) {
    return new Date(b.lastMessageAt) - new Date(a.lastMessageAt);
  });
  escalacoes = escList.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });
  pedidos = pedList.sort(function(a, b) { return new Date(b.timestamp) - new Date(a.timestamp); });
}

// ===== LOAD DATA =====
function loadData() {
  var since = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
  var btnRef = document.getElementById('btn-refresh');
  if (btnRef) btnRef.classList.add('spinning');

  Promise.all([
    supaGet('historico_bot', 'select=*&order=evento_at.asc&evento_at=gte.' + since + '&limit=10000'),
    supaGet('historico_atendimentos', 'select=*')
  ]).then(function(results) {
    var rows = results[0];
    var dismissals = results[1];
    var dSet = new Set(dismissals.map(function(d) { return d.dismiss_key; }));
    processData(rows, dSet);
    populateFilters();
    applyFilters();
    renderEscalacoes();
    renderPedidos();
    renderStats();
    var now = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });
    document.getElementById('updated-at').textContent = 'atualizado ' + now;
    if (btnRef) btnRef.classList.remove('spinning');
  }).catch(function(e) {
    showError('Erro ao carregar dados', e.message || e);
    if (btnRef) btnRef.classList.remove('spinning');
  });
}

// ===== POPULATE FILTERS FROM DATA =====
function populateFilters() {
  var actionSel = document.getElementById('filter-action');
  var statusSel = document.getElementById('filter-status');
  var curA = actionSel.value, curS = statusSel.value;
  var actions = {}, statuses = {};
  AC.forEach(function(c) {
    if (c.action) actions[c.action.toUpperCase()] = (actions[c.action.toUpperCase()] || 0) + 1;
    if (c.status) statuses[c.status] = (statuses[c.status] || 0) + 1;
  });
  var aLabels = { GPT:'GPT', PRODUTO_ENCONTRADO:'Produto Encontrado', MODELO_ESCOLHIDO:'Modelo Escolhido', AGUARDANDO_CONFIRMACAO:'Aguard. Confirmacao', FRETE_COTADO:'Frete Cotado', PEDIDO_CONFIRMADO:'Pedido Confirmado', ESCALADO:'Escalado', NOTIFICACAO_COMERCIAL_ESCALACAO:'Notif. Escalacao', NOTIFICACAO_COMERCIAL_PEDIDO:'Notif. Pedido', FOLLOWUP:'Follow-up' };
  var sLabels = { QUALIFICACAO:'Qualificacao', CONFIRMAR_VERSAO:'Confirmar Versao', CONFIRMAR_FAMILIA:'Confirmar Familia', CONFIRMACAO_PEDIDO:'Confirmacao Pedido', ESCOLHER_FRETE:'Escolher Frete', MAIS_ITENS_OU_PEDIDO:'Mais Itens/Pedido', PEDIDO_CONFIRMADO:'Pedido Confirmado', ESCALADO_COMERCIAL:'Escalado Comercial', pedido_confirmado:'Pedido Confirmado', escalado:'Escalado' };
  actionSel.innerHTML = '<option value="">Todas acoes</option>';
  Object.keys(actions).sort(function(a,b){ return actions[b]-actions[a]; }).forEach(function(k) {
    actionSel.innerHTML += '<option value="' + k + '">' + (aLabels[k] || k) + ' (' + actions[k] + ')</option>';
  });
  statusSel.innerHTML = '<option value="">Todos status</option>';
  Object.keys(statuses).sort(function(a,b){ return statuses[b]-statuses[a]; }).forEach(function(k) {
    statusSel.innerHTML += '<option value="' + k + '">' + (sLabels[k] || k) + ' (' + statuses[k] + ')</option>';
  });
  actionSel.value = curA; statusSel.value = curS;
}

// ===== FILTERS =====
function getDateRange(period) {
  var now = new Date();
  var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (period === 'today') return { from: todayStart, to: null };
  if (period === 'yesterday') {
    var yStart = new Date(todayStart); yStart.setDate(yStart.getDate() - 1);
    return { from: yStart, to: todayStart };
  }
  if (period === '7d') {
    var w = new Date(todayStart); w.setDate(w.getDate() - 7);
    return { from: w, to: null };
  }
  if (period === '30d') {
    var m = new Date(todayStart); m.setDate(m.getDate() - 30);
    return { from: m, to: null };
  }
  if (period === 'custom') {
    var df = document.getElementById('filter-date-from').value;
    var dt = document.getElementById('filter-date-to').value;
    return {
      from: df ? new Date(df + 'T00:00:00') : null,
      to: dt ? new Date(dt + 'T23:59:59') : null
    };
  }
  return { from: null, to: null };
}

function applyFilters() {
  try {
    var q = document.getElementById('search-input').value.toLowerCase();
    var fa = document.getElementById('filter-action').value;
    var fs = document.getElementById('filter-status').value;
    var fp = document.getElementById('filter-period').value;
    var range = getDateRange(fp);
    document.getElementById('custom-date-row').style.display = fp === 'custom' ? 'flex' : 'none';
    filtered = AC.filter(function(c) {
      var m = q === '' ||
        (c.customerName || '').toLowerCase().indexOf(q) >= 0 ||
        (c.phone || '').indexOf(q) >= 0 ||
        (c.product || '').toLowerCase().indexOf(q) >= 0 ||
        (c.messages || []).some(function(x) { return (x.text || '').toLowerCase().indexOf(q) >= 0; });
      if (!m) return false;
      if (fa && (c.action || '').toUpperCase() !== fa) return false;
      if (fs && c.status !== fs) return false;
      if (range.from || range.to) {
        // Filtro de data usa startedAt (primeira msg) em vez de lastMessageAt
        // Motivo: conversa iniciada ontem + follow-up hoje deve continuar em "Ontem".
        // Atividade recente permanece visivel via paineis de Escalacoes/Pedidos (real-time).
        var cDate = new Date(c.startedAt || c.lastMessageAt);
        if (range.from && cDate < range.from) return false;
        if (range.to && cDate > range.to) return false;
      }
      return true;
    });
    renderStats();
    renderList();
  } catch(e) { showError('Erro ao filtrar', e.message); }
}
window.applyFilters = applyFilters;

document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('filter-period').addEventListener('change', applyFilters);
document.getElementById('filter-action').addEventListener('change', applyFilters);
document.getElementById('filter-status').addEventListener('change', applyFilters);
document.getElementById('filter-date-from').addEventListener('change', applyFilters);
document.getElementById('filter-date-to').addEventListener('change', applyFilters);

// ===== SIDEBAR LIST =====
function renderList() {
  try {
    var el = document.getElementById('conv-list');
    if (filtered.length === 0) {
      el.innerHTML = '<div class=empty-state>' + (AC.length === 0 ? 'Nenhuma conversa encontrada' : 'Nenhuma conversa corresponde ao filtro') + '</div>';
      document.getElementById('sidebar-footer').textContent = '';
      return;
    }
    el.innerHTML = filtered.map(function(c) {
      var al = ACTION_LABELS[(c.action || '').toUpperCase()] || { label: c.action || '-', color: '#94a3b8', bg: 'rgba(148,163,184,0.12)' };
      var sl = STATUS_LABELS[c.status] || { label: c.status || '-', color: '#94a3b8' };
      var msgs = c.messages || [], last = msgs[msgs.length - 1];
      var prev = last ? (last.from === 'bot' ? 'Bot: ' : 'Cliente: ') + esc((last.text || '').slice(0, 55)) : 'Sem msgs';
      return '<div class="conv-item' + (c.id === selId ? ' active' : '') + '" data-id="' + esc(c.id) + '">'
        + '<div style="display:flex;justify-content:space-between"><span class=name>' + esc(c.customerName || 'Cliente') + '</span><span style="font-size:11px;color:#64748b">' + fmtDate(c.startedAt) + '</span></div>'
        + '<div class=phone>' + waLink(c.phone) + '</div>'
        + '<div class=preview>' + prev + '</div>'
        + '<div class=tags>'
        + '<span class=action-badge style="color:' + al.color + ';background:' + al.bg + '">' + al.label + '</span>'
        + (c.status ? '<span class=status-dot style="color:' + sl.color + '">&bull; ' + sl.label + '</span>' : '')
        + (c.via_shortcut === 'SIM' ? '<span class=shortcut-badge>&#9889; atalho</span>' : '')
        + '</div></div>';
    }).join('');
    document.getElementById('sidebar-footer').textContent = filtered.length + ' de ' + AC.length + ' conversas';
  } catch(e) { showError('Erro ao listar conversas', e.message); }
}

document.getElementById('conv-list').addEventListener('click', function(ev) {
  var item = ev.target.closest('.conv-item');
  if (item && item.dataset.id) selectConv(item.dataset.id);
});

// ===== SELECT CONVERSATION (chat view) =====
function selectConv(id) {
  try {
    selId = id;
    renderList();
    var c = AC.find(function(x) { return x.id === id; });
    if (!c) return;
    var al = ACTION_LABELS[(c.action || '').toUpperCase()] || { label: c.action || '-', color: '#94a3b8', bg: 'rgba(148,163,184,0.12)' };
    var sl = STATUS_LABELS[c.status] || { label: c.status || '-', color: '#94a3b8' };
    var msgs = c.messages || [];
    var dur;
    try {
      var s = new Date(c.startedAt), e2 = new Date(c.lastMessageAt), d = Math.round((e2 - s) / 60000);
      dur = isNaN(d) ? '-' : d + ' min';
    } catch(ex) { dur = '-'; }

    document.getElementById('chat-area').innerHTML =
      '<div class=chat-header>'
      + '<div style="display:flex;align-items:center">'
      + '<div class=avatar>&#128100;</div>'
      + '<div class=chat-header-info>'
      + '<div class=cname>' + esc(c.customerName || 'Cliente') + '</div>'
      + '<div class=cphone>' + waLink(c.phone) + '</div>'
      + '</div></div>'
      + '<div class=chat-header-badges>'
      + '<span class=hbadge style="color:' + al.color + ';background:' + al.bg + '">' + al.label + '</span>'
      + '<span class=hbadge style="color:' + sl.color + ';background:rgba(0,0,0,0.2);border:1px solid ' + sl.color + '40">&bull; ' + sl.label + '</span>'
      + '</div></div>'
      + '<div class=chat-date>' + fmtFull(c.startedAt)
      + (c.product ? '<span style="margin-left:8px;font-size:10px;background:rgba(255,255,255,0.06);border-radius:6px;padding:2px 8px;color:#94a3b8">' + esc(c.product) + (c.modelo ? ' (' + esc(c.modelo) + ')' : '') + '</span>' : '')
      + '</div>'
      + '<div class=chat-messages id=chat-msgs>'
      + (msgs.length === 0
        ? '<div style="text-align:center;color:#475569;padding:24px;font-size:13px">Nenhuma mensagem registrada</div>'
        : msgs.map(function(m) {
          var isBot = m.from === 'bot';
          return '<div class="bubble-wrap ' + (isBot ? 'bot' : 'customer') + '">'
            + (isBot ? '<div class="bubble-avatar bot-av">&#129302;</div>' : '')
            + '<div class="bubble ' + (isBot ? 'bot' : 'customer') + '"><p>' + esc(m.text) + '</p><div class=btime>' + (m.time || '') + '</div></div>'
            + (!isBot ? '<div class="bubble-avatar cust-av">&#128100;</div>' : '')
            + '</div>';
        }).join(''))
      + '</div>'
      + '<div class=chat-footer>'
      + '<span>' + msgs.length + ' msgs</span>'
      + '<span>' + dur + '</span>'
      + '<span>' + msgs.filter(function(m) { return m.from === 'bot'; }).length + ' respostas bot</span>'
      + (c.via_shortcut === 'SIM' ? '<span>&#9889; Atalho</span>' : '')
      + '</div>';

    setTimeout(function() {
      var m2 = document.getElementById('chat-msgs');
      if (m2) m2.scrollTop = m2.scrollHeight;
    }, 50);
  } catch(e) { showError('Erro ao abrir conversa', e.message); }
}
window.selectConv = selectConv;

// ===== ESCALACOES PANEL =====
function renderEscalacoes() {
  document.getElementById('esc-count').textContent = escalacoes.length;
  var el = document.getElementById('esc-list');
  if (escalacoes.length === 0) {
    el.innerHTML = '<div class=esc-empty>Nenhuma escalacao pendente.</div>';
    return;
  }
  el.innerHTML = escalacoes.map(function(e, idx) {
    var msg = e.lastMessage ? e.lastMessage.substring(0, 80) + (e.lastMessage.length > 80 ? '...' : '') : '';
    var tipoLabel = e.tipo === 'timeout'
      ? '<span class="etype timeout">Timeout</span>'
      : '<span class="etype direto">Direto</span>';
    return '<div class=esc-card data-conv="' + esc(e.convId) + '">'
      + '<div class=et>&#128226; ' + esc(e.timeFormatted || '') + tipoLabel + '</div>'
      + '<div class=ei><span class=en>' + esc(e.customerName || 'Cliente') + '</span><span class=ep>' + waLink(e.phone) + '</span></div>'
      + (msg ? '<div class=em>&#128172; "' + esc(msg) + '"</div>' : '')
      + (e.product ? '<div class=epr>&#128230; ' + esc(e.product) + (e.modelo ? ' - ' + esc(e.modelo) : '') + '</div>' : '')
      + '<button class=dismiss-btn onclick="event.stopPropagation();openDismiss(this)" data-session="' + esc(e.sessionId) + '" data-tipo="escalacao" data-nome="' + esc(e.customerName) + '" data-tel="' + esc(e.phone) + '" data-prod="' + esc(e.product) + '" data-ts="' + esc(e.timestamp) + '">&#10006; Dispensar</button>'
      + '</div>';
  }).join('');
}

// ===== PEDIDOS PANEL =====
function renderPedidos() {
  document.getElementById('ped-count').textContent = pedidos.length;
  var el = document.getElementById('ped-list');
  if (pedidos.length === 0) {
    el.innerHTML = '<div class=ped-empty>Nenhum pedido pendente.</div>';
    return;
  }
  el.innerHTML = pedidos.map(function(p, idx) {
    var prodInfo = [p.product, p.modelo].filter(Boolean).join(' - ');
    var comercialMsg = '&#9989; ATENDIMENTO CONCLUIDO\n'
      + '&#128100; ' + esc(p.customerName) + '\n'
      + '&#128241; +' + esc(p.phone) + '\n'
      + '&#128230; ' + esc(prodInfo || 'N/A') + '\n'
      + '&#9888;&#65039; Entrar em contato com o cliente.';
    return '<div class=ped-card data-conv="' + esc(p.convId) + '">'
      + '<div class=pt>&#9989; ' + esc(p.timeFormatted || '') + '</div>'
      + '<div class=pi><span class=pn>' + esc(p.customerName || 'Cliente') + '</span><span class=pp>' + waLink(p.phone) + '</span></div>'
      + (prodInfo ? '<div class=ppr>&#128230; ' + esc(prodInfo) + '</div>' : '')
      + '<div class=pcm>' + comercialMsg + '</div>'
      + '<button class=dismiss-btn onclick="event.stopPropagation();openDismiss(this)" data-session="' + esc(p.sessionId) + '" data-tipo="pedido" data-nome="' + esc(p.customerName) + '" data-tel="' + esc(p.phone) + '" data-prod="' + esc([p.product, p.modelo].filter(Boolean).join(' - ')) + '" data-ts="' + esc(p.timestamp) + '">&#9989; Concluir</button>'
      + '</div>';
  }).join('');
}

// ===== PANEL TOGGLES =====
function setupPanel(tId, pId) {
  var t = document.getElementById(tId), p = document.getElementById(pId);
  if (!t || !p) return;
  t.addEventListener('click', function() {
    t.classList.toggle('open');
    p.classList.toggle('open');
  });
}
setupPanel('esc-toggle', 'esc-panel');
setupPanel('ped-toggle', 'ped-panel');

// Click on escalacao/pedido card -> select that conversation
document.getElementById('esc-panel').addEventListener('click', function(ev) {
  var card = ev.target.closest('[data-conv]');
  if (card && !ev.target.closest('.dismiss-btn')) {
    var id = card.getAttribute('data-conv');
    if (window.selectConv) window.selectConv(id);
  }
});
document.getElementById('ped-panel').addEventListener('click', function(ev) {
  var card = ev.target.closest('[data-conv]');
  if (card && !ev.target.closest('.dismiss-btn')) {
    var id = card.getAttribute('data-conv');
    if (window.selectConv) window.selectConv(id);
  }
});

// ===== DISMISS MODAL =====
function openDismiss(btn) {
  var d = btn.dataset;
  var ov = document.createElement('div');
  ov.className = 'dismiss-modal-overlay';
  var tit = (d.tipo === 'escalacao') ? 'Dispensar Escalacao' : 'Concluir Pedido';
  var sub = (d.nome || 'Cliente') + ' - ' + (d.tel || '');
  ov.innerHTML = '<div class=dismiss-modal>'
    + '<h3>' + tit + '</h3>'
    + '<div class=dm-sub>' + sub + '</div>'
    + '<textarea id=dm-msg placeholder="Observacao..."></textarea>'
    + '<div class=dm-actions>'
    + '<button class=dm-cancel id=dm-cancel>Cancelar</button>'
    + '<button class=dm-confirm id=dm-ok>Confirmar</button>'
    + '</div>'
    + '<div class=dm-status id=dm-status></div>'
    + '</div>';
  document.body.appendChild(ov);

  ov.addEventListener('click', function(ev) { if (ev.target === ov) ov.remove(); });
  document.getElementById('dm-cancel').addEventListener('click', function() { ov.remove(); });
  document.getElementById('dm-ok').addEventListener('click', function() {
    var okBtn = this;
    okBtn.disabled = true;
    okBtn.textContent = 'Enviando...';
    var stEl = document.getElementById('dm-status');
    var msg = document.getElementById('dm-msg').value;

    fetch(DISMISS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        tipo: d.tipo,
        nome_cliente: d.nome,
        telefone: d.tel,
        produto: d.prod,
        session_id: d.session,
        mensagem_dismiss: msg,
        quem_dispensou: 'admin',
        card_timestamp: d.ts
      })
    }).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function(res) {
      if (res.success) {
        // Remove the card visually
        var card = btn.closest('.esc-card,.ped-card');
        if (card) card.style.display = 'none';

        // Update counts
        var ec2 = document.querySelectorAll('.esc-card'), pc2 = document.querySelectorAll('.ped-card');
        var ev2 = 0, pv2 = 0;
        for (var i = 0; i < ec2.length; i++) { if (ec2[i].style.display !== 'none') ev2++; }
        for (var j = 0; j < pc2.length; j++) { if (pc2[j].style.display !== 'none') pv2++; }
        document.getElementById('esc-count').textContent = ev2;
        document.getElementById('ped-count').textContent = pv2;
        if (ev2 === 0) {
          var el2 = document.querySelector('.esc-list');
          if (el2) el2.innerHTML = '<div class=esc-empty>Nenhuma escalacao pendente.</div>';
        }
        if (pv2 === 0) {
          var pl2 = document.querySelector('.ped-list');
          if (pl2) pl2.innerHTML = '<div class=ped-empty>Nenhum pedido pendente.</div>';
        }
        ov.remove();
      } else {
        stEl.style.color = '#ef4444';
        stEl.textContent = 'Erro: ' + (res.message || 'Falha');
        okBtn.disabled = false;
        okBtn.textContent = 'Confirmar';
      }
    }).catch(function(err) {
      stEl.style.color = '#ef4444';
      stEl.textContent = 'Erro: ' + err.message;
      okBtn.disabled = false;
      okBtn.textContent = 'Confirmar';
    });
  });
}
window.openDismiss = openDismiss;

})();
</script>
