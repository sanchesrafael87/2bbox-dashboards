<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PedroBot - Historico</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;overflow:hidden}
.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:#0f172a}
.login-box{background:#1e293b;padding:2rem;border-radius:12px;text-align:center;min-width:320px}
.login-box h2{margin-bottom:1rem;color:#38bdf8}
.login-box input{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;margin-bottom:1rem;font-size:14px}
.login-box button{width:100%;padding:10px;border-radius:8px;border:none;background:#3b82f6;color:white;font-weight:600;cursor:pointer;font-size:14px}
.login-box button:hover{background:#2563eb}
.login-error{color:#ef4444;font-size:12px;margin-top:8px;display:none}
.app{display:none;height:100vh;grid-template-columns:360px 1fr;grid-template-rows:auto 1fr}
.app.active{display:grid}
.header{grid-column:1/-1;background:#1e293b;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.header h1{font-size:16px;color:#38bdf8}
.header .stats{font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:16px}
.sidebar{background:#1e293b;border-right:1px solid #334155;overflow-y:auto;display:flex;flex-direction:column}
.search-box{padding:12px;border-bottom:1px solid #334155}
.search-box input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:13px}
.filters{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #334155}
.filters button{padding:4px 10px;border-radius:12px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;white-space:nowrap}
.filters button.active{background:#3b82f6;color:white;border-color:#3b82f6}
.conv-list{flex:1;overflow-y:auto}
.conv-item{padding:12px 16px;border-bottom:1px solid #0f172a;cursor:pointer;transition:background .15s}
.conv-item:hover{background:#334155}
.conv-item.selected{background:#1e3a5f;border-left:3px solid #3b82f6}
.conv-item .name{font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.conv-item .phone{font-size:12px;color:#64748b;margin-top:2px}
.conv-item .preview{font-size:12px;color:#94a3b8;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.chat-area{display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:16px 20px;background:#1e293b;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center}
.chat-header .info h3{font-size:15px}
.chat-header .info .meta{font-size:12px;color:#64748b;margin-top:2px}
.chat-header .tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg.customer{align-self:flex-end;background:#065f46;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:#1e293b;border-bottom-left-radius:4px}
.msg .time{font-size:10px;color:#64748b;margin-top:4px;text-align:right}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;color:#475569;font-size:14px}
.panel{margin:8px 20px;background:#1e293b;border-radius:8px;border:1px solid #334155}
.panel-toggle{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:13px;user-select:none}
.panel-toggle .count{color:white;padding:2px 8px;border-radius:10px;font-size:11px}
.panel-body{display:none;padding:0 16px 12px;max-height:300px;overflow-y:auto}
.panel-body.open{display:block}
.card{background:#0f172a;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid #334155}
.card .card-header{display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:6px}
.card .card-title{font-weight:600;font-size:13px;margin-bottom:4px}
.card .card-body{font-size:12px;color:#94a3b8}
.btn-dismiss{margin-top:8px;padding:4px 12px;border-radius:6px;border:1px solid #475569;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer}
.btn-dismiss:hover{background:#334155;color:#e2e8f0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#1e293b;border-radius:12px;padding:24px;min-width:400px;max-width:500px}
.modal h3{margin-bottom:12px;color:#38bdf8}
.modal textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:13px;min-height:80px;margin-bottom:12px;resize:vertical}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal button{padding:8px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;font-weight:500}
.btn-cancel{background:#334155;color:#e2e8f0}
.btn-confirm{background:#3b82f6;color:white}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-size:14px;padding:40px}
.c-gpt{background:#6366f1;color:white}.c-produto{background:#22c55e;color:white}.c-modelo{background:#14b8a6;color:white}
.c-frete{background:#f59e0b;color:#000}.c-confirm{background:#3b82f6;color:white}.c-pedido{background:#8b5cf6;color:white}
.c-escalado{background:#ef4444;color:white}.c-followup{background:#f97316;color:white}
.refresh-btn{background:none;border:1px solid #334155;color:#94a3b8;padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.refresh-btn:hover{background:#334155;color:#e2e8f0}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>PedroBot Dashboard</h2>
    <p style="color:#94a3b8;margin-bottom:1rem;font-size:13px">Historico de conversas</p>
    <input type="password" id="loginPass" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError">Senha incorreta</div>
  </div>
</div>
<div class="app" id="app">
  <div class="header">
    <h1>PedroBot &mdash; Historico</h1>
    <div class="stats" id="statsBar">Carregando...</div>
  </div>
  <div class="sidebar">
    <div class="search-box"><input type="text" id="searchInput" placeholder="Buscar nome, telefone, produto..." oninput="renderSidebar()"></div>
    <div class="filters" id="filtersBar"></div>
    <div class="conv-list" id="convList"><div class="loading">Carregando conversas...</div></div>
  </div>
  <div class="chat-area" id="chatArea">
    <div id="panelsArea"></div>
    <div class="empty-chat" id="emptyChat">Selecione uma conversa</div>
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="info"><h3 id="chatName"></h3><div class="meta" id="chatMeta"></div></div>
      <div class="tags" id="chatTags"></div>
    </div>
    <div class="messages" id="messagesArea" style="display:none"></div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Dispensar item</h3>
    <textarea id="modalNote" placeholder="Observacao (opcional)"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="modalConfirm">Confirmar</button>
    </div>
  </div>
</div>
<script>
const SUPA='https://zlymorwcuzqhbxfysywd.supabase.co',AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpseW1vcndjdXpxaGJ4ZnlzeXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTY5MTIsImV4cCI6MjA5MTY3MjkxMn0.KKFergrjWiDt0Bj-iFYdsMfBYO7qrollMer1YvLwTxI';
const DISMISS_WH='https://cases2bbox.app.n8n.cloud/webhook/dismiss-card',PW='2bbox2026';
let convs=[],escs=[],peds=[],selId=null,filt=null;

function doLogin(){if(document.getElementById('loginPass').value===PW){document.getElementById('loginScreen').style.display='none';document.getElementById('app').classList.add('active');loadData()}else{document.getElementById('loginError').style.display='block'}}

async function sGet(t,p=''){const r=await fetch(SUPA+'/rest/v1/'+t+'?'+p,{headers:{apikey:AK,Authorization:'Bearer '+AK}});if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}

async function loadData(){
  try{
    const since=new Date(Date.now()-30*24*60*60*1000).toISOString();
    const[rows,dis]=await Promise.all([sGet('historico_bot','select=*&order=evento_at.asc&evento_at=gte.'+since),sGet('historico_atendimentos','select=*')]);
    const dSet=new Set(dis.map(function(d){return d.dismiss_key}));
    processData(rows,dSet);renderSidebar();renderPanels();updateStats();
  }catch(e){document.getElementById('convList').innerHTML='<div class="loading" style="color:#ef4444">Erro: '+e.message+'</div>'}
}

function processData(rows,dSet){
  var sm={},el=[],pl=[],se=new Set(),sp=new Set();
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var sid=r.session_id||'?',rawTel=String(r.telefone||''),ts=r.evento_at||r.timestamp_raw||'',ac=(r.acao||'').toUpperCase(),st=(r.status_conversa||'').toLowerCase();
    var tel=rawTel.indexOf('*')>=0?sid.replace('whatsapp:',''):rawTel;
    if(!sm[sid])sm[sid]={id:sid,phone:tel,name:r.nome_cliente||'Cliente',startedAt:ts,lastAt:ts,action:r.acao||'',status:r.status_conversa||'',product:r.produto||'',modelo:r.modelo_case||'',msgs:[]};
    var s=sm[sid];
    if(ts>s.lastAt){s.lastAt=ts;s.action=r.acao||s.action;s.status=r.status_conversa||s.status;s.product=r.produto||s.product;s.modelo=r.modelo_case||s.modelo}
    if(r.nome_cliente&&r.nome_cliente!=='Cliente')s.name=r.nome_cliente;
    var tf=ts?new Date(ts).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'}):'';
    if(r.mensagem_cliente)s.msgs.push({f:'c',t:r.mensagem_cliente,tm:tf});
    if(r.resposta_bot)s.msgs.push({f:'b',t:r.resposta_bot,tm:tf});
    var isE=ac.indexOf('NOTIFICACAO_COMERCIAL_ESCALACAO')>=0||ac==='ESCALAR_HUMANO'||st==='escalado'||st==='escalado_timeout';
    var isP=ac.indexOf('NOTIFICACAO_COMERCIAL_PEDIDO')>=0||st==='pedido_confirmado'||st==='aguardando_comercial';
    if(isE&&!se.has(sid)){se.add(sid);var dk=sid+'|escalacao|'+ts;var dismissed=false;dSet.forEach(function(k){if(k.indexOf(sid+'|escalacao|')===0)dismissed=true});if(!dismissed)el.push({ts:ts,phone:tel,name:r.nome_cliente||'Cliente',product:r.produto||'',modelo:r.modelo_case||'',lastMsg:r.mensagem_cliente||'',sid:sid,tipo:st==='escalado_timeout'?'timeout':'direto',dk:dk})}
    if(isP&&!sp.has(sid)){sp.add(sid);var dk2=sid+'|pedido|'+ts;var dismissed2=false;dSet.forEach(function(k){if(k.indexOf(sid+'|pedido|')===0)dismissed2=true});if(!dismissed2)pl.push({ts:ts,phone:tel,name:r.nome_cliente||'Cliente',product:r.produto||'',modelo:r.modelo_case||'',lastMsg:r.mensagem_cliente||'',sid:sid,dk:dk2})}
  }
  convs=Object.values(sm).sort(function(a,b){return new Date(b.lastAt)-new Date(a.lastAt)});
  escs=el.sort(function(a,b){return new Date(b.ts)-new Date(a.ts)});
  peds=pl.sort(function(a,b){return new Date(b.ts)-new Date(a.ts)});
}

var AC={GPT:'c-gpt',PRODUTO_ENCONTRADO:'c-produto',MODELO_ESCOLHIDO:'c-modelo',FRETE_COTADO:'c-frete',AGUARDANDO_CONFIRMACAO:'c-confirm',PEDIDO_CONFIRMADO:'c-pedido',ESCALADO:'c-escalado',NOTIFICACAO_COMERCIAL_ESCALACAO:'c-escalado',NOTIFICACAO_COMERCIAL_PEDIDO:'c-pedido',FOLLOWUP:'c-followup'};
function h(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function waLink(phone){var p=String(phone||'').replace(/[^0-9]/g,'');if(!p)return'';return'<a href="https://wa.me/'+p+'" target="_blank" style="color:#38bdf8;text-decoration:none">'+p+'</a>'}
function fd(ts){if(!ts)return'';return new Date(ts).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}

function renderSidebar(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var f=convs;
  if(q)f=f.filter(function(c){return(c.name||'').toLowerCase().indexOf(q)>=0||(c.phone||'').indexOf(q)>=0||(c.product||'').toLowerCase().indexOf(q)>=0});
  if(filt)f=f.filter(function(c){return(c.action||'').toUpperCase()===filt});
  var acts=[];var seen={};convs.forEach(function(c){if(c.action&&!seen[c.action]){seen[c.action]=1;acts.push(c.action)}});
  document.getElementById('filtersBar').innerHTML='<button class="'+(!filt?'active':'')+'" onclick="setF(null)">Todos</button>'+acts.map(function(a){return'<button class="'+(filt===a.toUpperCase()?'active':'')+'" onclick="setF(\''+a.toUpperCase()+'\')">'+h(a)+'</button>'}).join('');
  document.getElementById('convList').innerHTML=f.length===0?'<div class="loading">Nenhuma conversa</div>':f.map(function(c){
    var cc=AC[(c.action||'').toUpperCase()]||'c-gpt';
    var lm=c.msgs.length>0?c.msgs[c.msgs.length-1].t:'';
    return'<div class="conv-item '+(c.id===selId?'selected':'')+'" onclick="selConv(\''+h(c.id).replace(/'/g,"\\'")+'\')"><div class="name">'+h(c.name)+' <span class="badge '+cc+'">'+h(c.action||'GPT')+'</span></div><div class="phone">'+waLink(c.phone)+' &middot; '+fd(c.lastAt)+'</div><div class="preview">'+h(lm).substring(0,80)+'</div></div>';
  }).join('');
}

function selConv(id){
  selId=id;var c=convs.find(function(x){return x.id===id});if(!c)return;
  document.getElementById('emptyChat').style.display='none';
  document.getElementById('chatHeader').style.display='flex';
  document.getElementById('messagesArea').style.display='flex';
  document.getElementById('chatName').textContent=c.name;
  document.getElementById('chatMeta').innerHTML=waLink(c.phone)+' \u00b7 '+fd(c.startedAt)+' \u2014 '+fd(c.lastAt);
  var cc=AC[(c.action||'').toUpperCase()]||'c-gpt';
  document.getElementById('chatTags').innerHTML='<span class="tag '+cc+'">'+h(c.action||'GPT')+'</span>'+(c.product?'<span class="tag" style="background:#334155">'+h(c.product)+'</span>':'')+(c.modelo?'<span class="tag" style="background:#334155">'+h(c.modelo)+'</span>':'');
  var ma=document.getElementById('messagesArea');
  ma.innerHTML=c.msgs.map(function(m){return'<div class="msg '+(m.f==='c'?'customer':'bot')+'"><div>'+h(m.t)+'</div><div class="time">'+m.tm+'</div></div>'}).join('');
  ma.scrollTop=ma.scrollHeight;
  renderSidebar();
}

function renderPanels(){
  var x='';
  if(escs.length>0){x+='<div class="panel"><div class="panel-toggle" onclick="togP(this)">\u{1F6A8} Escalacoes <span class="count" style="background:#ef4444">'+escs.length+'</span></div><div class="panel-body">'+escs.map(function(e,i){return'<div class="card"><div class="card-header"><span>'+fd(e.ts)+'</span><span>'+h(e.tipo)+'</span></div><div class="card-title">'+h(e.name)+' &mdash; '+waLink(e.phone)+'</div><div class="card-body">'+h(e.product)+' '+h(e.modelo)+'<br><em>"'+h(e.lastMsg).substring(0,100)+'"</em></div><button class="btn-dismiss" onclick="openD(\'e\','+i+')">Dispensar</button></div>'}).join('')+'</div></div>'}
  if(peds.length>0){x+='<div class="panel"><div class="panel-toggle" onclick="togP(this)">\u2705 Pedidos <span class="count" style="background:#22c55e">'+peds.length+'</span></div><div class="panel-body">'+peds.map(function(p,i){return'<div class="card"><div class="card-header"><span>'+fd(p.ts)+'</span></div><div class="card-title">'+h(p.name)+' &mdash; '+waLink(p.phone)+'</div><div class="card-body">'+h(p.product)+' '+h(p.modelo)+'</div><button class="btn-dismiss" onclick="openD(\'p\','+i+')">Concluir</button></div>'}).join('')+'</div></div>'}
  document.getElementById('panelsArea').innerHTML=x;
}

function updateStats(){
  document.getElementById('statsBar').innerHTML='<span>'+convs.length+' conversas</span><span>'+escs.length+' escalacoes</span><span>'+peds.length+' pedidos</span><button class="refresh-btn" onclick="loadData()">\u{1F504} Atualizar</button>';
}

function setF(v){filt=v;renderSidebar()}
function togP(el){el.nextElementSibling.classList.toggle('open')}

var pendD=null;
function openD(tipo,idx){var it=tipo==='e'?escs[idx]:peds[idx];pendD={tipo:tipo,idx:idx,it:it};document.getElementById('modalTitle').textContent=tipo==='e'?'Dispensar Escalacao':'Concluir Pedido';document.getElementById('modalNote').value='';document.getElementById('modalOverlay').classList.add('open');document.getElementById('modalConfirm').onclick=confD}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');pendD=null}
async function confD(){
  if(!pendD)return;var tipo=pendD.tipo,it=pendD.it;var note=document.getElementById('modalNote').value;
  try{await fetch(DISMISS_WH,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tipo:tipo==='e'?'escalacao':'pedido',nome_cliente:it.name,telefone:it.phone,produto:it.product,session_id:it.sid,mensagem_dismiss:note,quem_dispensou:'admin',card_timestamp:it.ts})});
    if(tipo==='e')escs=escs.filter(function(e){return e.dk!==it.dk});else peds=peds.filter(function(p){return p.dk!==it.dk});
    renderPanels();updateStats();
  }catch(e){alert('Erro: '+e.message)}
  closeModal();
}

setInterval(function(){if(document.getElementById('app').classList.contains('active'))loadData()},5*60*1000);
</script>
</body>
</html>
